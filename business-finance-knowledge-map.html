              { text: { zh: 'A. 這是正常現象，只要持續加碼行銷預算就能解決', en: 'A. This is normal — simply increasing marketing budget will resolve it', fr: 'A. C\'est normal — augmenter simplement le budget marketing résoudra le problème' }, correct: false, reason: { zh: '盲目加碼行銷只會讓CAC惡化得更快，並未解決LTV停滯背後的產品或留存問題。', en: 'Blindly increasing marketing spend only worsens CAC faster and doesn\'t address the underlying product or retention issues behind stagnant LTV.', fr: 'Augmenter aveuglément le marketing aggrave le CAC plus vite et ne résout pas les problèmes de produit ou de rétention.' } },
              { text: { zh: 'B. 這是商業模式健康度的紅旗，應深入檢視產品留存率、定價策略與獲客渠道效率，再決定是否繼續擴張', en: 'B. This is a red flag for business model health; should deeply examine product retention, pricing strategy, and acquisition channel efficiency before deciding to scale further', fr: 'B. C\'est un signal d\'alarme pour la santé du modèle d\'affaires ; il faut examiner en profondeur la rétention, la tarification et l\'efficacité des canaux avant de décider de poursuivre l\'expansion' }, correct: true, reason: { zh: '正確！CAC上升、LTV停滯意味著單位經濟惡化，這是投資人評估新創「規模化前是否該先優化單位經濟」的關鍵訊號。', en: 'Correct! Rising CAC with stagnant LTV signals deteriorating unit economics — a key signal investors use to assess whether a startup should optimize unit economics before scaling.', fr: 'Correct ! Le CAC en hausse avec LTV stagnante signale une économie unitaire qui se dégrade — un signal clé avant de décider d\'investir dans la mise à l\'échelle.' } },
              { text: { zh: 'C. 立即停止所有行銷活動以降低CAC', en: 'C. Immediately halt all marketing activities to reduce CAC', fr: 'C. Arrêter immédiatement toutes les activités marketing pour réduire le CAC' }, correct: false, reason: { zh: '完全停止行銷會直接損害成長動能，正確做法是優化渠道與留存，而非一刀切停止。', en: 'Completely halting marketing directly harms growth momentum; the correct approach is to optimize channels and retention, not a blanket stop.', fr: 'Arrêter complètement le marketing nuit directement à la dynamique de croissance ; il faut optimiser les canaux, pas tout arrêter.' } }

              { text: { zh: 'B. 設計「信心分數」機制，低信心或高金額爭議自動升級轉交人工客服處理，僅自動處理高信心、低風險案例', en: 'B. Design a confidence-score mechanism that auto-escalates low-confidence or high-value disputes to human agents, only auto-resolving high-confidence, low-risk cases', fr: 'B. Concevoir un mécanisme de score de confiance qui escalade automatiquement les litiges à faible confiance ou de grande valeur vers des agents humains' }, correct: true, reason: { zh: '正確！AI產品設計的關鍵是建立風險分級機制，讓AI專注處理高信心場景，將不確定或高風險案例交由人工把關，這是負責任的人機協作設計。', en: 'Correct! The key to AI product design is risk-tiering — letting AI handle high-confidence cases while routing uncertain or high-risk cases to humans is responsible human-AI collaboration design.', fr: 'Correct ! La clé est la hiérarchisation des risques — l\'IA traite les cas à haute confiance, les cas incertains vont aux humains : une conception responsable.' } },
              { text: { zh: 'C. 直接關閉這個聊天機器人功能', en: 'C. Simply shut down the chatbot feature entirely', fr: 'C. Désactiver complètement la fonctionnalité de chatbot' }, correct: false, reason: { zh: '完全關閉功能放棄了AI能處理簡單案例帶來的效率提升，並非平衡風險與價值的最佳解法。', en: 'Completely shutting down the feature forfeits the efficiency gains from AI handling simple cases, not the optimal way to balance risk and value.', fr: 'Désactiver complètement abandonne les gains d\'efficacité sur les cas simples, ce n\'est pas la meilleure façon d\'équilibrer risque et valeur.' } }

              { text: { zh: 'B. 導入智能排程系統（如優先級佇列、資源配額），並分析利用率低落是否源自閒置資源未被有效共享', en: 'B. Implement an intelligent scheduling system (priority queues, resource quotas) and analyze whether low utilization stems from idle resources not being effectively shared', fr: 'B. Mettre en place un système d\'ordonnancement intelligent et analyser si la faible utilisation provient de ressources inactives non partagées' }, correct: true, reason: { zh: '正確！利用率低但排隊嚴重，典型問題是資源分配不均（部分團隊獨佔閒置資源），需要透過智能排程與配額機制提升整體資源共享效率。', en: 'Correct! Low utilization with severe queuing is a classic uneven-allocation problem (some teams monopolizing idle resources); intelligent scheduling and quotas improve overall sharing efficiency.', fr: 'Correct ! Faible utilisation avec files d\'attente sévères est un problème classique de répartition inégale, nécessitant ordonnancement intelligent et quotas.' } },
              { text: { zh: 'C. 限制研究團隊每週只能跑兩次實驗以節省資源', en: 'C. Limit research teams to only two experiments per week to save resources', fr: 'C. Limiter les équipes de recherche à seulement deux expériences par semaine pour économiser les ressources' }, correct: false, reason: { zh: '強硬限制實驗次數會嚴重拖慢研究進度與創新速度，並未解決資源調度效率不佳的根本問題。', en: 'Rigidly limiting experiment frequency severely slows research progress and innovation speed, without solving the underlying scheduling inefficiency.', fr: 'Limiter rigidement la fréquence des expériences ralentit gravement la recherche sans résoudre l\'inefficacité d\'ordonnancement sous-jacente.' } }

          englishTitle: 'DS & Research',
          badge: 'Frontier',
          icon: 'fa-flask-vial',
          description: { zh: '透過嚴謹的科學方法探索新的模型架構、演算法與資料方法論，推動AI能力的前沿邊界，並將研究成果轉化為可發表或可落地的成果。', en: 'Explore new model architectures, algorithms, and data methodologies through rigorous scientific methods, pushing the frontier of AI capabilities and translating research into publishable or deployable outcomes.', fr: 'Explorer de nouvelles architectures, algorithmes et méthodologies via des méthodes scientifiques rigoureuses, repoussant les frontières de l\'IA.' },
          subfields: [{ zh: '模型架構研究', en: 'Model Architecture Research', fr: 'Recherche en Architecture de Modèles' }, { zh: '實驗設計與假設驗證', en: 'Experimental Design & Hypothesis Testing', fr: 'Conception Expérimentale & Test d\'Hypothèses' }, { zh: '資料標註與品質管理', en: 'Data Annotation & Quality Management', fr: 'Annotation de Données & Gestion de la Qualité' }, { zh: '論文發表與開源貢獻', en: 'Publication & Open-Source Contribution', fr: 'Publication & Contribution Open-Source' }],
          skills: [
            { zh: '**數學與統計基礎**：具備深厚的線性代數、機率論與最佳化理論基礎，能理解並改進模型內部機制。', en: '**Mathematical & Statistical Foundations**: Deep grounding in linear algebra, probability, and optimization theory to understand and improve model internals.', fr: '**Fondations Mathématiques & Statistiques**: Bases solides en algèbre linéaire, probabilités et théorie de l\'optimisation.' },
            { zh: '**嚴謹實驗方法論**：能設計具對照組的消融實驗（Ablation Study），準確歸因模型效能變化的原因。', en: '**Rigorous Experimental Methodology**: Designing controlled ablation studies to accurately attribute causes of model performance changes.', fr: '**Méthodologie Expérimentale Rigoureuse**: Concevoir des études d\'ablation contrôlées pour attribuer précisément les causes.' },
            { zh: '**前沿文獻追蹤**：能快速閱讀並評估最新研究論文，判斷哪些技術具備落地應用價值。', en: '**Frontier Literature Tracking**: Rapidly reading and evaluating cutting-edge papers to judge which techniques have practical application value.', fr: '**Veille de la Littérature de Pointe**: Lire et évaluer rapidement les articles de pointe pour juger leur valeur applicative.' }
          ],
          tools: ['PyTorch/JAX', 'Weights & Biases', 'arXiv/Papers with Code', 'Jupyter/Colab'],
          scenario: {
            question: { zh: '研究員提出一個新模型架構，初步實驗顯示準確率比基線模型高出5%，但僅測試過一個資料集，該如何嚴謹地驗證此發現？', en: 'A researcher proposes a new model architecture; preliminary experiments show 5% higher accuracy than the baseline, but only tested on one dataset. How should this finding be rigorously validated?', fr: 'Un chercheur propose une nouvelle architecture ; les expériences montrent 5% de précision supérieure à la référence, mais testée sur un seul jeu de données. Comment valider rigoureusement cette découverte ?' },
            options: [
              { text: { zh: 'A. 立即發表論文宣稱重大突破', en: 'A. Immediately publish a paper claiming a major breakthrough', fr: 'A. Publier immédiatement un article revendiquant une percée majeure' }, correct: false, reason: { zh: '單一資料集的結果可能僅是過擬合或巧合，未經多重驗證即發表會損害研究信譽且可能誤導後續研究方向。', en: 'Results on a single dataset may simply be overfitting or coincidence; publishing without multi-validation damages research credibility and may mislead future research directions.', fr: 'Les résultats sur un seul jeu de données peuvent être un surajustement ou une coïncidence ; publier sans validation multiple nuit à la crédibilité.' } },
              { text: { zh: 'B. 在多個不同分布的資料集上重複實驗，並進行消融實驗排除其他變數的干擾，確認效能提升的真正來源', en: 'B. Repeat the experiment across multiple datasets with different distributions, and conduct ablation studies to rule out confounding variables, confirming the true source of performance gains', fr: 'B. Répéter l\'expérience sur plusieurs jeux de données de distributions différentes et mener des études d\'ablation pour confirmer la véritable source des gains' }, correct: true, reason: { zh: '正確！嚴謹的研究方法要求在多個獨立資料集上驗證結果的穩健性，並透過消融實驗排除混淆變數，才能確認效能提升確實來自新架構本身。', en: 'Correct! Rigorous research methodology requires validating robustness across multiple independent datasets and using ablation studies to rule out confounding variables before confirming gains truly stem from the new architecture.', fr: 'Correct ! Une méthodologie rigoureuse exige de valider la robustesse sur plusieurs jeux de données indépendants et d\'utiliser des études d\'ablation.' } },
              { text: { zh: 'C. 直接將此架構部署到生產環境讓所有使用者使用', en: 'C. Directly deploy this architecture to production for all users immediately', fr: 'C. Déployer directement cette architecture en production pour tous les utilisateurs immédiatement' }, correct: false, reason: { zh: '未經充分驗證就直接全量上線生產環境風險極高，可能在真實世界資料分布下表現不如預期甚至造成損害。', en: 'Deploying to full production without sufficient validation is extremely risky, as it may underperform or cause harm under real-world data distributions.', fr: 'Déployer en pleine production sans validation suffisante est extrêmement risqué, car la performance pourrait être inférieure dans des conditions réelles.' } }
            ]
          }
        },
        ai_governance_ethics: {
          id: 'ai_governance_ethics',
          title: { zh: 'AI 治理與倫理政策', en: 'AI Governance, Ethics & Policy', fr: 'Gouvernance, Éthique & Politique de l\'IA' },
          englishTitle: 'AI Governance',
          badge: 'Responsible AI',
          icon: 'fa-scale-balanced',
          description: { zh: '制定並落實AI系統的安全、公平與透明準則，涵蓋演算法偏見治理、監管合規與AI安全研究，確保技術發展與社會責任並重。', en: 'Develop and implement safety, fairness, and transparency guidelines for AI systems — covering algorithmic bias governance, regulatory compliance, and AI safety research to balance technological progress with social responsibility.', fr: 'Développer et mettre en œuvre des lignes directrices de sécurité, d\'équité et de transparence pour les systèmes IA — gouvernance des biais algorithmiques, conformité réglementaire et recherche en sécurité IA.' },
          subfields: [{ zh: '演算法偏見與公平性', en: 'Algorithmic Bias & Fairness', fr: 'Biais Algorithmique & Équité' }, { zh: 'AI監管法規遵循', en: 'AI Regulatory Compliance', fr: 'Conformité Réglementaire IA' }, { zh: 'AI安全與對齊研究', en: 'AI Safety & Alignment Research', fr: 'Recherche en Sécurité & Alignement IA' }, { zh: '透明度與可解釋性', en: 'Transparency & Explainability', fr: 'Transparence & Explicabilité' }],
          skills: [
            { zh: '**偏見偵測與緩解**：能運用公平性指標審計模型輸出，識別並緩解對特定群體的系統性偏見。', en: '**Bias Detection & Mitigation**: Using fairness metrics to audit model outputs, identifying and mitigating systematic bias against specific groups.', fr: '**Détection & Atténuation des Biais**: Utiliser des métriques d\'équité pour auditer les sorties de modèles et atténuer les biais systématiques.' },
            { zh: '**法規政策解讀**：熟悉歐盟AI法案、各國AI監管框架，能將法規要求轉化為可執行的合規措施。', en: '**Regulatory Policy Interpretation**: Familiarity with the EU AI Act and various national AI regulatory frameworks, translating requirements into actionable compliance measures.', fr: '**Interprétation des Politiques Réglementaires**: Maîtrise du règlement européen sur l\'IA et des cadres réglementaires nationaux.' },
            { zh: '**可解釋性技術應用**：能運用SHAP、LIME等工具，將「黑箱」模型決策轉化為人類可理解的解釋。', en: '**Explainability Technique Application**: Using tools like SHAP and LIME to translate "black box" model decisions into human-understandable explanations.', fr: '**Application des Techniques d\'Explicabilité**: Utiliser SHAP et LIME pour traduire les décisions de modèles "boîte noire" en explications compréhensibles.' }
          ],
          tools: ['IBM AI Fairness 360', 'SHAP/LIME', 'EU AI Act Frameworks', 'Model Cards/Datasheets'],
          scenario: {
            question: { zh: '一家銀行的AI信用評分模型被發現對特定族群的拒貸率顯著偏高，即便排除了種族變數，治理團隊應如何處理？', en: 'A bank\'s AI credit scoring model is found to have a significantly higher rejection rate for a specific demographic group, even after excluding race as a variable. How should the governance team respond?', fr: 'Le modèle de notation de crédit IA d\'une banque montre un taux de rejet significativement plus élevé pour un groupe démographique spécifique, même après exclusion de la race comme variable. Comment l\'équipe de gouvernance doit-elle réagir ?' },
            options: [
              { text: { zh: 'A. 既然已經排除種族變數，模型應該是公平的，無需進一步調查', en: 'A. Since the race variable was already excluded, the model should be fair and no further investigation is needed', fr: 'A. Puisque la variable de race a déjà été exclue, le modèle devrait être équitable, aucune enquête supplémentaire n\'est nécessaire' }, correct: false, reason: { zh: '這是典型的「代理變數偏見」（Proxy Bias）誤區——即使排除敏感變數，模型仍可能透過郵遞區號、消費模式等代理變數間接學習到歧視性模式。', en: 'This is the classic "proxy bias" trap — even with sensitive variables excluded, the model can still indirectly learn discriminatory patterns through proxy variables like zip code or spending patterns.', fr: 'C\'est le piège classique du "biais de proxy" — même en excluant les variables sensibles, le modèle peut apprendre indirectement des schémas discriminatoires via des variables proxy.' } },
              { text: { zh: 'B. 深入審計是否存在代理變數偏見，運用公平性指標量化差異影響，並考慮重新設計特徵或採用公平性約束的訓練方法', en: 'B. Deeply audit for proxy variable bias, quantify disparate impact using fairness metrics, and consider redesigning features or adopting fairness-constrained training methods', fr: 'B. Auditer en profondeur les biais de variables proxy, quantifier l\'impact disparate avec des métriques d\'équité, et envisager de repenser les caractéristiques' }, correct: true, reason: { zh: '正確！面對疑似代理變數偏見，治理團隊必須進行深入的公平性審計，量化「差異影響」（Disparate Impact），並透過特徵重設計或公平性約束演算法從根源解決問題。', en: 'Correct! Facing suspected proxy bias, the governance team must conduct a thorough fairness audit, quantify disparate impact, and address the issue at its root through feature redesign or fairness-constrained algorithms.', fr: 'Correct ! Face à un biais de proxy suspecté, il faut un audit d\'équité approfondi, quantifier l\'impact disparate et repenser les caractéristiques pour résoudre le problème à la racine.' } },
              { text: { zh: 'C. 直接停用整個AI評分系統，恢復人工審核所有貸款申請', en: 'C. Immediately disable the entire AI scoring system and revert to fully manual review of all loan applications', fr: 'C. Désactiver immédiatement tout le système de notation IA et revenir à un examen entièrement manuel de toutes les demandes' }, correct: false, reason: { zh: '人工審核同樣可能帶有隱性偏見且難以規模化，完全棄用AI並非最優解，應優先嘗試診斷與修正模型本身的偏見問題。', en: 'Manual review can equally carry implicit bias and is hard to scale; completely abandoning AI isn\'t the optimal solution — diagnosing and fixing the model\'s bias should be the priority.', fr: 'L\'examen manuel peut aussi comporter des biais implicites et est difficile à mettre à l\'échelle ; abandonner complètement l\'IA n\'est pas optimal.' } }
            ]
          }
        }
      }
    };

            { zh: '**啟動價值時間優化**：能識別並縮短使用者首次體驗到「啊哈時刻」(Aha Moment)的時間，提升啟用率。', en: '**Time-to-Value Optimization**: Identifying and shortening the time for users to reach their "Aha Moment," improving activation rate.', fr: '**Optimisation du Temps de Valeur**: Identifier et raccourcir le temps jusqu\'au "moment Aha" pour améliorer le taux d\'activation.' },
            { zh: '**產品數據分析**：能透過行為事件追蹤識別轉換漏斗中的流失節點，並設計對應的產品干預。', en: '**Product Analytics**: Using behavioral event tracking to identify drop-off points in the conversion funnel and design corresponding product interventions.', fr: '**Analytique Produit**: Utiliser le suivi d\'événements comportementaux pour identifier les points d\'abandon dans le tunnel de conversion.' },
            { zh: '**病毒式增長機制設計**：能設計協作邀請、團隊共享等內建的病毒傳播功能。', en: '**Viral Growth Mechanism Design**: Designing built-in viral features like collaboration invites and team sharing.', fr: '**Conception de Mécanismes de Croissance Virale**: Concevoir des fonctionnalités virales intégrées comme les invitations collaboratives.' }
          ],
          tools: ['Amplitude/Mixpanel', 'Pendo/Appcues', 'Segment', 'Intercom'],
          scenario: {
            question: { zh: '一個專案管理SaaS工具的免費試用轉付費轉換率僅2%，遠低於業界平均15%，但使用者活躍度數據顯示正常，PLG團隊應優先檢視什麼？', en: 'A project management SaaS tool has only a 2% free-trial-to-paid conversion rate, far below the 15% industry average, yet engagement data looks normal. What should the PLG team examine first?', fr: 'Un outil SaaS de gestion de projet a un taux de conversion essai-payant de seulement 2%, bien inférieur à la moyenne du secteur (15%), mais les données d\'engagement semblent normales. Que doit examiner l\'équipe PLG en premier ?' },
            options: [
              { text: { zh: 'A. 直接縮短免費試用期，逼迫使用者更快做出付費決定', en: 'A. Simply shorten the free trial period to force users to decide on payment faster', fr: 'A. Raccourcir simplement la période d\'essai pour forcer une décision de paiement plus rapide' }, correct: false, reason: { zh: '在未診斷根因前縮短試用期可能讓使用者尚未體會到足夠價值就被迫做決定，反而進一步降低轉換率。', en: 'Shortening the trial before diagnosing the root cause may force users to decide before experiencing enough value, further reducing conversion.', fr: 'Raccourcir l\'essai avant de diagnostiquer la cause racine peut forcer une décision avant que l\'utilisateur perçoive suffisamment de valeur.' } },
              { text: { zh: 'B. 分析「活躍但未轉換」使用者的具體使用模式，找出他們是否觸及付費牆功能、定價方案是否與其需求錯位', en: 'B. Analyze the specific usage patterns of "active but unconverted" users to determine whether they\'re hitting paywalled features or if pricing plans are misaligned with their needs', fr: 'B. Analyser les schémas d\'utilisation des utilisateurs "actifs mais non convertis" pour déterminer s\'ils atteignent des fonctionnalités payantes ou si la tarification est mal alignée' }, correct: true, reason: { zh: '正確！活躍度正常但轉換率低，意味著問題並非產品吸引力不足，而可能是定價方案設計、付費牆位置或價值傳遞時機出現錯位，需深入分析使用模式找出斷點。', en: 'Correct! Normal engagement with low conversion means the issue isn\'t lack of product appeal, but likely pricing plan design, paywall placement, or value communication timing misalignment — requiring deep usage pattern analysis.', fr: 'Correct ! Engagement normal avec conversion faible signifie que le problème n\'est pas l\'attractivité du produit mais probablement la tarification ou le placement du mur payant.' } },
              { text: { zh: 'C. 增加更多免費功能讓使用者更滿意', en: 'C. Add more free features to make users happier', fr: 'C. Ajouter plus de fonctionnalités gratuites pour satisfaire les utilisateurs' }, correct: false, reason: { zh: '增加免費功能可能進一步降低付費動機，在未找出轉換障礙前盲目加碼免費內容只會惡化問題。', en: 'Adding more free features may further reduce payment motivation; blindly adding free content before identifying conversion barriers will only worsen the problem.', fr: 'Ajouter plus de fonctionnalités gratuites peut réduire davantage la motivation à payer, aggravant le problème.' } }
            ]
          }
        },
        subscription_metrics: {
          id: 'subscription_metrics',
          title: { zh: '訂閱制商業指標', en: 'Subscription Metrics', fr: 'Indicateurs d\'Abonnement' },
          englishTitle: 'Sub Metrics',
          badge: 'MRR/NRR',
          icon: 'fa-chart-pie',
          description: { zh: '掌握月經常性收入(MRR)、年經常性收入(ARR)、流失率(Churn)與淨收入留存率(NRR)等核心指標，是評估SaaS企業健康度與估值的根本語言。', en: 'Master core metrics like Monthly/Annual Recurring Revenue (MRR/ARR), Churn, and Net Revenue Retention (NRR) — the fundamental language for evaluating SaaS business health and valuation.', fr: 'Maîtriser les indicateurs clés comme le MRR/ARR, le taux de churn et le NRR — le langage fondamental pour évaluer la santé et la valorisation d\'une entreprise SaaS.' },
          subfields: [{ zh: 'MRR/ARR分解分析', en: 'MRR/ARR Decomposition', fr: 'Décomposition du MRR/ARR' }, { zh: '流失率與留存率', en: 'Churn & Retention Rate', fr: 'Taux de Churn & Rétention' }, { zh: '淨收入留存率(NRR)', en: 'Net Revenue Retention (NRR)', fr: 'Rétention Nette des Revenus (NRR)' }, { zh: '單位經濟與LTV:CAC', en: 'Unit Economics & LTV:CAC', fr: 'Économie Unitaire & LTV:CAC' }],
          skills: [
            { zh: '**MRR橋接分析**：能將MRR變化拆解為新客、擴張、收縮與流失四個組成部分，精準定位增長或衰退驅動因素。', en: '**MRR Bridge Analysis**: Decomposing MRR changes into new business, expansion, contraction, and churn components to precisely identify growth or decline drivers.', fr: '**Analyse du Pont MRR**: Décomposer les variations de MRR en nouveaux clients, expansion, contraction et churn pour identifier précisément les moteurs.' },
            { zh: '**留存曲線解讀**：能繪製並解讀同期群留存曲線(Cohort Retention Curve)，評估產品的長期黏著力。', en: '**Retention Curve Interpretation**: Plotting and interpreting cohort retention curves to assess long-term product stickiness.', fr: '**Interprétation de la Courbe de Rétention**: Tracer et interpréter les courbes de rétention par cohorte pour évaluer la fidélité à long terme.' },
            { zh: '**LTV:CAC比率計算**：能精算客戶終生價值與獲客成本比率，判斷商業模式的可持續性（理想值通常為3:1以上）。', en: '**LTV:CAC Ratio Calculation**: Precisely calculating the customer lifetime value to acquisition cost ratio to judge business model sustainability (ideally 3:1 or higher).', fr: '**Calcul du Ratio LTV:CAC**: Calculer précisément le ratio valeur vie client/coût d\'acquisition pour juger la durabilité (idéalement 3:1 ou plus).' }
          ],
          tools: ['ChartMogul/Baremetrics', 'Stripe Billing', 'Excel/SQL', 'Looker/Tableau'],
          scenario: {
            question: { zh: '一家SaaS公司的整體MRR持續成長，但同期群留存曲線顯示老客戶流失率正在惡化，財務長應如何解讀此現象？', en: 'A SaaS company\'s overall MRR keeps growing, but cohort retention curves show older customer churn is worsening. How should the CFO interpret this?', fr: 'Le MRR global d\'une entreprise SaaS continue de croître, mais les courbes de rétention par cohorte montrent que le churn des anciens clients s\'aggrave. Comment le CFO doit-il interpréter cela ?' },
            options: [
              { text: { zh: 'A. MRR成長代表公司很健康，流失率惡化不需要特別關注', en: 'A. MRR growth indicates the company is healthy; worsening churn doesn\'t need special attention', fr: 'A. La croissance du MRR indique que l\'entreprise est en bonne santé ; l\'aggravation du churn ne nécessite pas d\'attention particulière' }, correct: false, reason: { zh: '這是危險的誤判。新客增長可能正在掩蓋舊客大量流失的問題，這種「漏水的桶子」模式長期會導致增長動能枯竭。', en: 'This is a dangerous misjudgment. New customer growth may be masking significant old customer churn — this "leaky bucket" pattern will eventually exhaust growth momentum.', fr: 'C\'est une erreur dangereuse. La croissance de nouveaux clients peut masquer un churn important — ce schéma de "seau qui fuit" épuisera la dynamique de croissance.' } },
              { text: { zh: 'B. 警覺到這是「漏水的桶子」現象——新客增長掩蓋了留存問題，應立即深入調查老客戶流失的根本原因並優先投資客戶成功', en: 'B. Recognize this as a "leaky bucket" phenomenon — new customer growth is masking retention problems; immediately investigate root causes of old customer churn and prioritize investment in customer success', fr: 'B. Reconnaître le phénomène du "seau qui fuit" — la croissance de nouveaux clients masque les problèmes de rétention ; enquêter immédiatement et prioriser l\'investissement en succès client' }, correct: true, reason: { zh: '正確！表面MRR成長但同期群留存惡化是典型的「漏水桶」警訊，意味著獲客成本投入正在彌補不斷擴大的流失缺口，必須立即診斷流失根因並強化客戶成功投資。', en: 'Correct! Surface-level MRR growth with worsening cohort retention is a classic "leaky bucket" warning sign, meaning acquisition spend is compensating for an expanding churn gap — root cause diagnosis and customer success investment must follow immediately.', fr: 'Correct ! La croissance du MRR avec une rétention par cohorte qui s\'aggrave est le signal classique du "seau qui fuit", nécessitant un diagnostic immédiat et un investissement en succès client.' } },
              { text: { zh: 'C. 立即停止所有新客戶獲取活動，把資源全部轉移到留存', en: 'C. Immediately halt all new customer acquisition activities and shift all resources to retention', fr: 'C. Arrêter immédiatement toutes les activités d\'acquisition et transférer toutes les ressources vers la rétention' }, correct: false, reason: { zh: '完全停止獲客是過度反應，正確做法是同時兼顧兩端：一方面持續健康獲客，另一方面加大力度修補留存缺口，而非二選一。', en: 'Completely halting acquisition is an overreaction; the correct approach is to address both fronts simultaneously — sustaining healthy acquisition while intensifying efforts to fix the retention gap, not choosing one over the other.', fr: 'Arrêter complètement l\'acquisition est une surréaction ; il faut traiter les deux fronts simultanément, pas choisir l\'un ou l\'autre.' } }
            ]
          }
        },
        customer_success_retention: {
          id: 'customer_success_retention',
          title: { zh: '客戶成功與留存', en: 'Customer Success & Retention', fr: 'Succès Client & Rétention' },
          englishTitle: 'Customer Success',
          badge: 'Retention',
          icon: 'fa-handshake',
          description: { zh: '主動協助客戶實現其期望的業務成果，透過健康分數監測、續約管理與向上銷售，將一次性交易轉化為長期且不斷擴張的夥伴關係。', en: 'Proactively help customers achieve their desired business outcomes — through health score monitoring, renewal management, and upselling, transforming one-time transactions into long-term, expanding partnerships.', fr: 'Aider proactivement les clients à atteindre leurs résultats business souhaités — via le suivi de scores de santé, la gestion des renouvellements et la vente incitative.' },
          subfields: [{ zh: '客戶健康分數模型', en: 'Customer Health Scoring', fr: 'Modèle de Score de Santé Client' }, { zh: '續約與向上銷售管理', en: 'Renewal & Upsell Management', fr: 'Gestion des Renouvellements & Ventes Incitatives' }, { zh: '使用者上手與培訓', en: 'Onboarding & Training', fr: 'Intégration & Formation' }, { zh: '客戶之聲回饋機制', en: 'Voice of Customer Feedback Loop', fr: 'Boucle de Rétroaction Voix du Client' }],
          skills: [
            { zh: '**主動風險識別**：能透過使用頻率下降、關鍵功能未啟用等早期訊號，在客戶流失前主動介入。', en: '**Proactive Risk Identification**: Identifying early warning signals like declining usage frequency or unactivated key features to intervene before churn occurs.', fr: '**Identification Proactive des Risques**: Identifier les signaux d\'alerte précoces pour intervenir avant le churn.' },
            { zh: '**業務成果對齊**：能持續將產品使用情況與客戶原始採購時設定的業務目標（如ROI）相互連結佐證。', en: '**Business Outcome Alignment**: Continuously linking product usage back to the original business goals (e.g., ROI) the customer set at purchase.', fr: '**Alignement des Résultats Business**: Relier continuellement l\'utilisation du produit aux objectifs business initiaux du client.' },
            { zh: '**擴張機會識別**：能識別客戶用量接近方案上限或團隊規模擴大等向上銷售時機。', en: '**Expansion Opportunity Identification**: Recognizing upsell timing signals such as customers approaching plan usage limits or team size growth.', fr: '**Identification des Opportunités d\'Expansion**: Reconnaître les signaux de vente incitative comme l\'approche des limites de plan.' }
          ],
          tools: ['Gainsight/ChurnZero', 'Salesforce/HubSpot CRM', 'Zendesk', 'Catalyst'],
          scenario: {
            question: { zh: '一個關鍵大客戶的健康分數連續兩個月下滑，使用頻率降低且主要聯絡人已離職，客戶成功經理應如何優先處理？', en: 'A key enterprise account\'s health score has declined for two consecutive months, with reduced usage and the main point of contact having left the company. How should the customer success manager prioritize this?', fr: 'Le score de santé d\'un grand compte clé a baissé deux mois consécutifs, avec une utilisation réduite et le départ du contact principal. Comment le gestionnaire de succès client doit-il prioriser cela ?' },
            options: [
              { text: { zh: 'A. 等待客戶主動聯繫，畢竟主動打擾可能讓客戶感到被推銷', en: 'A. Wait for the customer to reach out, since proactive contact might feel like a sales push', fr: 'A. Attendre que le client contacte en premier, car un contact proactif pourrait sembler être une vente forcée' }, correct: false, reason: { zh: '聯絡人離職加上使用率下滑是流失風險的高度警訊，被動等待會錯失關鍵的挽留時間窗口，續約風險極高。', en: 'Contact departure plus declining usage is a high-severity churn risk signal; passively waiting misses the critical retention window, with very high renewal risk.', fr: 'Le départ du contact et la baisse d\'utilisation sont des signaux de risque de churn élevé ; attendre passivement manque la fenêtre critique de rétention.' } },
              { text: { zh: 'B. 立即主動聯繫客戶確認新的關鍵聯絡人，重新進行業務目標對齊，並安排高層拜訪鞏固關係', en: 'B. Immediately proactively contact the customer to identify the new key contact, realign on business goals, and arrange an executive visit to solidify the relationship', fr: 'B. Contacter immédiatement le client pour identifier le nouveau contact clé, réaligner sur les objectifs business et organiser une visite exécutive' }, correct: true, reason: { zh: '正確！聯絡人離職是客戶成功領域最高優先級的風險訊號之一，必須立即主動介入重新建立關係、確認新利害關係人並重申產品價值，避免因人員斷層導致續約失敗。', en: 'Correct! Contact departure is one of the highest-priority risk signals in customer success; immediate proactive intervention to rebuild relationships, confirm new stakeholders, and reaffirm product value is essential to avoid renewal failure due to personnel gaps.', fr: 'Correct ! Le départ du contact est l\'un des signaux de risque les plus prioritaires en succès client, nécessitant une intervention proactive immédiate.' } },
              { text: { zh: 'C. 直接提供大幅折扣留住客戶', en: 'C. Simply offer a steep discount to retain the customer', fr: 'C. Offrir simplement une remise importante pour retenir le client' }, correct: false, reason: { zh: '在未確認根本問題（關係斷層、價值認知不足）前直接降價，治標不治本，且會侵蝕毛利並建立不健康的議價先例。', en: 'Offering a discount before confirming the root issue (relationship gap, perceived value) treats the symptom not the cause, erodes margin, and sets an unhealthy negotiation precedent.', fr: 'Offrir une remise avant de confirmer la cause racine traite le symptôme et non la cause, érode la marge et établit un précédent de négociation malsain.' } }
            ]
          }
        },
        saas_sales_gtm: {
          id: 'saas_sales_gtm',
          title: { zh: 'SaaS 銷售與 GTM', en: 'SaaS Sales & Go-To-Market', fr: 'Ventes SaaS & Stratégie GTM' },
          englishTitle: 'SaaS Sales & GTM',
          badge: 'Revenue',
          icon: 'fa-bullhorn',
          description: { zh: '設計從潛在客戶開發到成交的完整銷售動態流程，涵蓋銷售動作分層（SDR/AE/CSM）、市場進入策略與定價方案設計。', en: 'Design the full sales motion from lead generation to close — covering sales role segmentation (SDR/AE/CSM), go-to-market strategy, and pricing plan design.', fr: 'Concevoir le mouvement de vente complet de la génération de leads à la signature — segmentation des rôles, stratégie GTM et conception de tarification.' },
          subfields: [{ zh: '銷售漏斗與動作設計', en: 'Sales Funnel & Motion Design', fr: 'Conception de l\'Entonnoir & Mouvement de Vente' }, { zh: '市場進入策略(GTM)', en: 'Go-To-Market Strategy', fr: 'Stratégie de Mise sur le Marché' }, { zh: '定價方案設計', en: 'Pricing Plan Design', fr: 'Conception des Plans Tarifaires' }, { zh: '銷售與行銷協同', en: 'Sales-Marketing Alignment', fr: 'Alignement Ventes-Marketing' }],
          skills: [
            { zh: '**銷售流程設計**：能依據客單價與銷售複雜度，設計適合的銷售動作（PLG自助式、內部銷售或企業級顧問式銷售）。', en: '**Sales Process Design**: Designing the appropriate sales motion (PLG self-serve, inside sales, or enterprise consultative selling) based on deal size and complexity.', fr: '**Conception du Processus de Vente**: Concevoir le mouvement de vente approprié selon la taille et la complexité de la transaction.' },
            { zh: '**定價策略制定**：能運用價值導向定價（Value-Based Pricing）設計階梯式方案，最大化客戶終生價值。', en: '**Pricing Strategy Development**: Using value-based pricing to design tiered plans that maximize customer lifetime value.', fr: '**Élaboration de la Stratégie de Tarification**: Utiliser la tarification basée sur la valeur pour concevoir des plans à paliers.' },
            { zh: '**管線預測與管理**：能精準預測銷售管線轉換率，並識別卡關的交易階段。', en: '**Pipeline Forecasting & Management**: Accurately forecasting pipeline conversion rates and identifying stalled deal stages.', fr: '**Prévision & Gestion du Pipeline**: Prévoir précisément les taux de conversion du pipeline et identifier les étapes bloquées.' }
          ],
          tools: ['Salesforce/HubSpot', 'Outreach/Salesloft', 'Gong.io', 'Clari'],
          scenario: {
            question: { zh: '一家SaaS公司原本主打中小企業市場採PLG自助式銷售，現在想拓展企業級大客戶，銷售團隊應如何調整GTM策略？', en: 'A SaaS company originally targeting SMBs via PLG self-serve sales now wants to expand into enterprise accounts. How should the sales team adjust its GTM strategy?', fr: 'Une entreprise SaaS ciblant initialement les PME via la vente PLG en self-service veut maintenant s\'étendre aux grands comptes. Comment l\'équipe de vente doit-elle ajuster sa stratégie GTM ?' },
            options: [
              { text: { zh: 'A. 沿用同一套自助式註冊流程，企業客戶也能自己上手', en: 'A. Continue using the same self-serve signup flow — enterprise customers can onboard themselves too', fr: 'A. Continuer avec le même flux d\'inscription en self-service — les clients entreprise peuvent aussi s\'intégrer eux-mêmes' }, correct: false, reason: { zh: '企業級採購通常涉及多方利害關係人、安全審核與客製化需求，純自助式流程無法滿足其決策複雜度與信任建立需求。', en: 'Enterprise procurement typically involves multiple stakeholders, security reviews, and customization needs that pure self-serve flows cannot satisfy in terms of decision complexity and trust-building.', fr: 'Les achats d\'entreprise impliquent généralement plusieurs parties prenantes, des revues de sécurité et des besoins de personnalisation que le self-service pur ne peut satisfaire.' } },
              { text: { zh: 'B. 建立專屬的企業銷售團隊（Enterprise AE），設計顧問式銷售流程涵蓋安全審查、客製化需求與多方利害關係人溝通', en: 'B. Build a dedicated enterprise sales team (Enterprise AE) and design a consultative sales process covering security review, customization needs, and multi-stakeholder communication', fr: 'B. Constituer une équipe de vente entreprise dédiée et concevoir un processus de vente consultatif couvrant la revue de sécurité, la personnalisation et la communication multi-parties' }, correct: true, reason: { zh: '正確！企業級客戶的銷售週期更長、決策更複雜，需要顧問式銷售模式與專屬團隊處理安全合規審查、客製化整合與多方利害關係人共識建立，這與PLG自助式截然不同。', en: 'Correct! Enterprise customers have longer sales cycles and more complex decisions, requiring a consultative sales model with dedicated teams to handle security compliance review, custom integrations, and multi-stakeholder consensus building — fundamentally different from PLG self-serve.', fr: 'Correct ! Les clients entreprise ont des cycles de vente plus longs et des décisions plus complexes, nécessitant un modèle de vente consultatif fondamentalement différent du self-service PLG.' } },
              { text: { zh: 'C. 直接大幅降價吸引企業客戶採用相同的自助式方案', en: 'C. Simply slash prices significantly to attract enterprise customers into the same self-serve plan', fr: 'C. Réduire considérablement les prix pour attirer les clients entreprise vers le même plan en self-service' }, correct: false, reason: { zh: '降價無法解決企業客戶決策流程複雜、需要安全合規保證與客製化整合的根本需求，且會嚴重侵蝕毛利。', en: 'Price cuts don\'t address the fundamental needs of enterprise customers around complex decision processes, security compliance assurance, and custom integration, while severely eroding margin.', fr: 'Les réductions de prix ne répondent pas aux besoins fondamentaux des clients entreprise en matière de conformité sécurité et d\'intégration personnalisée, tout en érodant gravement la marge.' } }
            ]
          }
        },
        cloud_architecture_security: {
          id: 'cloud_architecture_security',
          title: { zh: '雲端架構與安全', en: 'Cloud Architecture & Security/Compliance', fr: 'Architecture Cloud & Sécurité/Conformité' },
          englishTitle: 'Cloud & Security',
          badge: 'Trust',
          icon: 'fa-shield-halved',

            { zh: '**合規框架落實**：熟悉SOC 2 Type II、ISO 27001、GDPR等框架的具體控制措施與稽核準備流程。', en: '**Compliance Framework Implementation**: Familiarity with the specific controls and audit preparation processes for SOC 2 Type II, ISO 27001, and GDPR.', fr: '**Mise en Œuvre du Cadre de Conformité**: Maîtrise des contrôles spécifiques et processus de préparation d\'audit pour SOC 2, ISO 27001 et RGPD.' },
            { zh: '**高可用性架構設計**：能設計具備容錯、自動擴展與災難復原能力的架構，確保達成SLA承諾的正常運行時間。', en: '**High-Availability Architecture Design**: Designing fault-tolerant, auto-scaling, and disaster-recovery-capable architectures to meet SLA uptime commitments.', fr: '**Conception d\'Architecture Haute Disponibilité**: Concevoir des architectures tolérantes aux pannes pour respecter les engagements de disponibilité SLA.' }

            options: [
              { text: { zh: 'A. 直接告知客戶可以跳過稽核，先簽約再補做合規文件', en: 'A. Simply tell the customer the audit can be skipped, signing first and completing compliance documentation later', fr: 'A. Dire simplement au client que l\'audit peut être ignoré, en signant d\'abord et en complétant la documentation de conformité plus tard' }, correct: false, reason: { zh: '企業客戶的合規要求通常是不可妥協的採購前提，試圖規避會直接喪失交易機會並損害公司信譽。', en: 'Enterprise compliance requirements are typically non-negotiable procurement prerequisites; trying to bypass them will directly lose the deal and damage company credibility.', fr: 'Les exigences de conformité d\'entreprise sont généralement des conditions d\'achat non négociables ; tenter de les contourner fera perdre l\'affaire.' } },
              { text: { zh: 'B. 立即啟動SOC 2 Type II稽核流程（通常需3-12個月觀察期），優先建立必要的安全控制措施，並考慮先以Type I報告作為過渡', en: 'B. Immediately launch the SOC 2 Type II audit process (typically requiring a 3-12 month observation period), prioritize establishing necessary security controls, and consider a Type I report as an interim bridge', fr: 'B. Lancer immédiatement le processus d\'audit SOC 2 Type II (nécessitant généralement 3-12 mois d\'observation), prioriser les contrôles de sécurité nécessaires, et envisager un rapport Type I en transition' }, correct: true, reason: { zh: '正確！SOC 2 Type II需要一段時間驗證控制措施的持續有效性，新創團隊應立即啟動準備流程並善用Type I報告（驗證控制措施設計，無需長期觀察）作為短期過渡方案來推進交易。', en: 'Correct! SOC 2 Type II requires time to validate the ongoing effectiveness of controls. Startups should immediately launch preparation and leverage a Type I report (validating control design without a long observation period) as a short-term bridge to advance the deal.', fr: 'Correct ! SOC 2 Type II nécessite du temps pour valider l\'efficacité continue des contrôles. Les startups doivent lancer la préparation immédiatement et utiliser un rapport Type I comme transition.' } },
              { text: { zh: 'C. 放棄這個企業客戶，繼續專注於不需要合規認證的中小企業市場', en: 'C. Give up on this enterprise customer and continue focusing on the SMB market that doesn\'t require compliance certification', fr: 'C. Abandonner ce client entreprise et continuer à se concentrer sur le marché PME qui ne nécessite pas de certification de conformité' }, correct: false, reason: { zh: '放棄企業市場意味著放棄更高客單價與更穩定收入的成長機會，正確做法是投資建立合規能力以開拓此市場，而非迴避。', en: 'Abandoning the enterprise market means giving up growth opportunities with higher deal sizes and more stable revenue; the correct approach is investing in compliance capability to open this market, not avoiding it.', fr: 'Abandonner le marché entreprise signifie renoncer à des opportunités de croissance à plus forte valeur ; la bonne approche est d\'investir dans la conformité.' } }

    // ── Dropdown helpers ──────────────────────────────────────────────────
    const domainMeta = {
      finance:      { icon: 'fa-sack-dollar',          name: { zh: '金融學',   en: 'Finance',       fr: 'Finance' },      category: 'core_business' },
      accounting:   { icon: 'fa-calculator',           name: { zh: '會計學',   en: 'Accounting',    fr: 'Comptabilité' }, category: 'core_business' },
      marketing:    { icon: 'fa-bullhorn',             name: { zh: '行銷學',   en: 'Marketing',     fr: 'Marketing' },     category: 'core_business' },
      consulting:   { icon: 'fa-briefcase',            name: { zh: '管理顧問', en: 'Consulting',    fr: 'Conseil' },       category: 'core_business' },
      supply_chain: { icon: 'fa-truck-fast',           name: { zh: '供應鏈',   en: 'Supply Chain',  fr: 'Supply Chain' },  category: 'operations_strategy' },
      strategy:     { icon: 'fa-chess-queen',          name: { zh: '企業策略', en: 'Strategy',      fr: 'Stratégie' },     category: 'operations_strategy' },
      operations:   { icon: 'fa-industry',             name: { zh: '營運管理', en: 'Operations',    fr: 'Opérations' },    category: 'operations_strategy' },
      tech:         { icon: 'fa-microchip',             name: { zh: '科技業',   en: 'Tech Industry', fr: 'Industrie Tech' }, category: 'tech_emerging' },
      fmcg:         { icon: 'fa-cart-shopping',         name: { zh: '快消品 (FMCG)', en: 'FMCG',     fr: 'FMCG' },          category: 'tech_emerging' },
      ai:           { icon: 'fa-brain',                 name: { zh: '人工智慧', en: 'AI Industry',   fr: 'Industrie IA' },  category: 'tech_emerging' },
      saas:         { icon: 'fa-cloud',                 name: { zh: 'SaaS / 雲端', en: 'SaaS',       fr: 'SaaS' },          category: 'tech_emerging' },
    };

    const domainCategoryMeta = {
      core_business:      { zh: '商學核心', en: 'Core Business', fr: 'Cœur Business' },
      operations_strategy:{ zh: '營運與策略', en: 'Operations & Strategy', fr: 'Opérations & Stratégie' },
      tech_emerging:       { zh: '科技與新興產業', en: 'Tech & Emerging Industries', fr: 'Tech & Industries Émergentes' },
    };

    function toggleDomainDropdown() {
      const menu = document.getElementById('domain-dropdown-menu');
      const chevron = document.getElementById('dd-chevron');
      if (menu.classList.contains('hidden')) {
        renderDropdownList();
        menu.classList.remove('hidden');
        chevron.style.transform = 'rotate(180deg)';
      } else {
        closeDomainDropdown();
      }
    }

    function renderDropdownList() {
      const list = document.getElementById('domain-dropdown-list');
      const categoryOrder = ['core_business', 'operations_strategy', 'tech_emerging'];
      list.innerHTML = categoryOrder.map(catKey => {
        const keysInCat = Object.keys(domainMeta).filter(k => domainMeta[k].category === catKey);
        if (!keysInCat.length) return '';
        const header = `<div class="px-3 pt-3 pb-1.5 text-[10px] font-bold uppercase tracking-widest text-slate-500 select-none first:pt-1.5">${domainCategoryMeta[catKey][currentLang]}</div>`;
        const items = keysInCat.map(key => {
          const meta = domainMeta[key];
          const color = domainDatabase[key].themeColor;
          const isActive = key === currentDomainKey;
          return `<button onclick="switchDomain('${key}');closeDomainDropdown();"
            class="flex items-center gap-3 w-full px-3 py-2.5 rounded-xl text-sm transition-colors duration-150 ${isActive ? `bg-${color}-500/15 text-${color}-400` : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/60'}">
            <i class="fa-solid ${meta.icon} w-4 text-center shrink-0 ${isActive ? `text-${color}-400` : ''}"></i>
            <span class="font-semibold">${meta.name[currentLang]}</span>
            ${isActive ? '<i class="fa-solid fa-check ml-auto text-xs"></i>' : ''}
          </button>`;
        }).join('');
        return header + items;
      }).join('');
    }

    function closeDomainDropdown() {
      document.getElementById('domain-dropdown-menu').classList.add('hidden');
      document.getElementById('dd-chevron').style.transform = '';
    }

    function updateDropdownButton() {
      const meta = domainMeta[currentDomainKey];
      const color = domainDatabase[currentDomainKey].themeColor;
      document.getElementById('dd-domain-icon').className = `fa-solid ${meta.icon} text-${color}-400 text-sm w-4 text-center shrink-0`;
      document.getElementById('dd-domain-label').className = `flex-1 text-left text-sm font-bold text-${color}-400`;
      document.getElementById('dd-domain-label').textContent = meta.name[currentLang];
    }

    // 目前選取的領域 & 分支 ID
    let currentDomainKey = 'finance';
    let activeBranchId = 'corporate';

    // 3. 多語言切換的核心控制邏輯
    function setLanguage(lang) {
      if (!uiTranslations[lang]) return;
      currentLang = lang;
      localStorage.setItem('kb_lang', lang);
      
      // 更新語言按鈕樣式
      ['zh', 'en', 'fr'].forEach(l => {
        const btn = document.getElementById(`lang-${l}`);
        if (l === lang) {
          btn.className = "px-2.5 py-1 text-xs font-bold rounded-lg transition-all duration-200 bg-teal-500/15 text-teal-400 border border-teal-500/20";
        } else {
          btn.className = "px-2.5 py-1 text-xs font-bold rounded-lg transition-all duration-200 text-slate-400 hover:text-slate-200";
        }
      });

      // 更新 HTML 中的靜態標籤 (流暢翻譯)
      document.title = uiTranslations[lang].title;
      document.getElementById('header-title').innerText = uiTranslations[lang].title;
      document.getElementById('header-subtitle').innerText = uiTranslations[lang].subtitle;
      document.getElementById('global-search-input').placeholder = uiTranslations[lang].searchPlaceholder;
      
      // 更新下拉選單按鈕文字
      updateDropdownButton();

      // 詳細解析版塊靜態標籤
      document.getElementById('label-metadata').innerText = uiTranslations[lang].metadataLabel;
      document.getElementById('label-core-def').innerText = uiTranslations[lang].coreDefinition;
      document.getElementById('label-subfields').innerText = uiTranslations[lang].exploreBlocks;
      document.getElementById('label-skills').innerText = uiTranslations[lang].essentialSkills;
      document.getElementById('label-tools').innerText = uiTranslations[lang].industryTools;
      document.getElementById('label-certifications').innerText = uiTranslations[lang].certifications;
      document.getElementById('label-scenario').innerText = uiTranslations[lang].scenarioChallenge;
      document.getElementById('label-instructions').innerText = uiTranslations[lang].instructions;
      
      // Footer 與版權
      document.getElementById('footer-text').innerText = uiTranslations[lang].footer;

      // 重新渲染動態組件與目前選取的分支
      renderDomainMindmap(currentDomainKey);
      selectBranch(activeBranchId);
    }

    // 4. 動態屬性語系翻譯助手 (Helper)
    function t(obj) {
      if (!obj) return '';
      if (typeof obj === 'string') return obj;
      return obj[currentLang] || obj['zh'] || '';
    }

    // 5. 初始化載入
    window.addEventListener('load', () => {
      // 預設為繁體中文、金融領域、企業金融分支
      const savedLang = localStorage.getItem('kb_lang');
      setLanguage(savedLang && ['zh','en','fr'].includes(savedLang) ? savedLang : 'zh');
      
      // 全局搜尋監聽
      const searchInput = document.getElementById('global-search-input');
      searchInput.addEventListener('input', (e) => {
        handleGlobalSearch(e.target.value.trim());
      });

      // 監聽視窗尺寸改變，即時重繪連接線
      window.addEventListener('resize', drawConnections);
      
      // 點擊外部自動關閉下拉框
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#domain-dropdown-wrap')) closeDomainDropdown();
        if (!e.target.closest('#global-search-input') && !e.target.closest('#search-results-dropdown')) {
          document.getElementById('search-results-dropdown').classList.add('hidden');
        }
      });
    });

    // 6. 切換學科領域
    function switchDomain(domainKey) {
      if (!domainDatabase[domainKey]) return;
      currentDomainKey = domainKey;

      // 更新下拉選單按鈕外觀
      updateDropdownButton();

      // 重繪選取領域的心智圖
      renderDomainMindmap(domainKey);

      // 預設選取該領域的第一個分支子節點
      const firstBranchId = Object.keys(domainDatabase[domainKey].branches)[0];
      selectBranch(firstBranchId);
    }

    // 7. 渲染心智圖 (動態重構)
    function renderDomainMindmap(domainKey) {
      const data = domainDatabase[domainKey];
      
      // 更新標題引導與指示器
      document.getElementById('domain-indicator-text').innerText = t(data.indicatorText);
      
      const indicatorIcon = document.getElementById('domain-indicator-icon');
      indicatorIcon.className = `fa-solid ${data.indicatorIcon} text-${data.themeColor}-400 animate-pulse`;

      // 設置中心節點 (Hub)
      document.getElementById('central-zh').innerText = t(data.centralNode.zh);
      document.getElementById('central-en').innerText = t(data.centralNode.en);
      
      const badge = document.getElementById('central-badge');
      badge.innerText = t(data.centralNode.badge);
      badge.className = `absolute -bottom-2 bg-slate-900 text-[10px] text-${data.themeColor}-400 border border-${data.themeColor}-500/20 px-2.5 py-0.5 rounded-full font-bold`;

      const hubGlow = document.getElementById('central-hub-glow');
      hubGlow.className = `absolute -inset-1.5 bg-gradient-to-r from-${data.themeColor}-500 to-${data.themeColor}-700 rounded-2xl blur-lg opacity-60 group-hover:opacity-100 transition duration-500`;

      // 渲染子節點
      const grid = document.getElementById('nodes-grid');
      grid.innerHTML = '';

      const branches = Object.values(data.branches);
      grid.className = `grid grid-cols-2 md:grid-cols-${branches.length} gap-4 lg:gap-6 w-full max-w-6xl mt-2`;

      branches.forEach((branch) => {
        const btn = document.createElement('button');
        btn.id = `node-${branch.id}`;
        btn.onclick = () => selectBranch(branch.id);
        
        btn.className = `col-span-1 text-left flex flex-col justify-between p-4 rounded-2xl bg-slate-950/40 border border-slate-900 hover:border-${data.themeColor}-500/30 transition-all duration-300 relative group cursor-pointer`;
        
        btn.innerHTML = `
          <div class="flex items-start justify-between mb-4">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-${data.themeColor}-500/10 to-${data.themeColor}-500/5 border border-white/5 flex items-center justify-center transition-transform duration-300 group-hover:scale-105">
              <i class="fa-solid ${branch.icon} text-${data.themeColor}-400 text-sm md:text-base"></i>
            </div>
            <span class="text-[9px] bg-slate-900 text-${data.themeColor}-400 border border-${data.themeColor}-500/10 px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">${t(branch.badge)}</span>
          </div>
          <div>
            <h4 class="text-xs md:text-sm font-bold text-slate-100 group-hover:text-white">${t(branch.title)}</h4>
            <p class="text-[9px] text-slate-500 font-semibold truncate mt-0.5 uppercase tracking-wide font-mono">${t(branch.englishTitle)}</p>
          </div>
          <div id="glow-bar-${branch.id}" class="absolute bottom-0 left-4 right-4 h-0.5 rounded-full transition-all duration-300 opacity-0" style="background-color: ${data.hexColor}" />
        `;

        grid.appendChild(btn);
      });

      // 繪製連接線
      setTimeout(drawConnections, 150);
    }

    // 8. 選取特定分支子節點
    function selectBranch(branchId) {
      activeBranchId = branchId;
      const data = domainDatabase[currentDomainKey];
      const branch = data.branches[branchId];
      if (!branch) return;

      // A. 更新地圖節點的高亮狀態
      const allNodes = document.querySelectorAll('#nodes-grid button');
      allNodes.forEach(node => {
        const id = node.id.replace('node-', '');
        const glowBar = document.getElementById(`glow-bar-${id}`);
        if (id === branchId) {
          node.className = `col-span-1 text-left flex flex-col justify-between p-4 rounded-2xl bg-slate-900 border border-${data.themeColor}-500/60 ring-2 ring-${data.themeColor}-500/30 shadow-glow-${data.themeColor} scale-[1.03] transition-all duration-300 relative group cursor-pointer`;
          if (glowBar) glowBar.classList.remove('opacity-0');
        } else {
          node.className = `col-span-1 text-left flex flex-col justify-between p-4 rounded-2xl bg-slate-950/40 border border-slate-900 hover:border-${data.themeColor}-500/30 transition-all duration-300 relative group cursor-pointer`;
          if (glowBar) glowBar.classList.add('opacity-0');
        }
      });

      // B. 重繪連接線
      drawConnections();

      // C. 載入詳細資訊板塊的翻譯文本
      document.getElementById('detail-title').innerText = t(branch.title);
      document.getElementById('detail-tag').innerText = t(branch.englishTitle);
      document.getElementById('detail-meta').innerText = currentDomainKey.toUpperCase();
      document.getElementById('detail-desc').innerText = t(branch.description);

      // 更新 Icon 主題與配色
      const iconBox = document.getElementById('detail-icon-box');
      iconBox.className = `p-3.5 rounded-2xl transition-all duration-300 bg-${data.themeColor}-500/10 text-${data.themeColor}-400 border border-${data.themeColor}-500/20`;
      
      const iconEl = document.getElementById('detail-icon');
      iconEl.className = `fa-solid ${branch.icon} text-2xl`;

      const detailTag = document.getElementById('detail-tag');
      detailTag.className = `text-xs uppercase tracking-wider font-bold font-sans text-${data.themeColor}-400`;

      // D. 渲染子領域 (Subfields)
      const subfieldsContainer = document.getElementById('detail-subfields');
      subfieldsContainer.innerHTML = '';
      branch.subfields.forEach(sub => {
        const card = document.createElement('div');
        card.className = `p-4 rounded-2xl bg-slate-900/40 border border-slate-900 hover:border-slate-800 transition-all duration-300`;
        card.innerHTML = `
          <h5 class="text-xs md:text-sm font-bold text-white mb-1.5 flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full" style="background-color: ${data.hexColor}"></span>
            ${t(sub.name)}
          </h5>
          <p class="text-[11px] text-slate-400 leading-relaxed font-light">${t(sub.desc)}</p>
        `;
        subfieldsContainer.appendChild(card);
      });

      // E. 渲染專業技能 (Skills) 
      const skillsContainer = document.getElementById('detail-skills');
      skillsContainer.innerHTML = '';
      branch.skills.forEach(skillObj => {
        const li = document.createElement('li');
        li.className = 'flex items-start gap-3 text-xs md:text-sm text-slate-300 font-light leading-relaxed';
        
        // 解析簡單 Markdown 的 ** 粗體語法
        const skillText = t(skillObj);
        const formattedSkill = skillText.replace(/\*\*(.*?)\*\*/g, `<strong class="text-white font-semibold">$1</strong>`);
        
        li.innerHTML = `
          <span class="mt-1" style="color: ${data.hexColor}"><i class="fa-solid fa-circle-check"></i></span>
          <div>${formattedSkill}</div>
        `;
        skillsContainer.appendChild(li);
      });

      // F. 渲染工具
      const toolsContainer = document.getElementById('detail-tools');
      toolsContainer.innerHTML = '';
      branch.tools.forEach(tool => {
        const tag = document.createElement('span');
        tag.className = `px-3 py-1.5 bg-slate-900 border border-slate-850 hover:border-${data.themeColor}-500/30 rounded-xl text-xs font-semibold text-slate-300 cursor-default transition-all duration-200`;
        tag.innerText = tool;
        toolsContainer.appendChild(tag);
      });

      // F-2. 渲染相關證照與課程
      const certsContainer = document.getElementById('detail-certifications');
      certsContainer.innerHTML = '';
      (branch.certifications || []).forEach(cert => {
        const chip = document.createElement('span');
        chip.className = 'px-3 py-1.5 bg-slate-900 border border-slate-800 rounded-lg text-xs text-slate-300 flex items-center gap-1.5';
        chip.innerHTML = `<i class="fa-solid fa-certificate text-[10px]" style="color: ${data.hexColor}"></i> ${t(cert)}`;
        certsContainer.appendChild(chip);
      });

      // G. 渲染情境題目
      document.getElementById('scenario-question').innerText = t(branch.scenario.question);
      const optionsContainer = document.getElementById('scenario-options');
      optionsContainer.innerHTML = '';

      const feedbackEl = document.getElementById('scenario-feedback');
      feedbackEl.className = 'hidden';

      branch.scenario.options.forEach((opt, idx) => {
        const optBtn = document.createElement('button');
        optBtn.className = 'w-full text-left p-3.5 rounded-xl bg-slate-900/60 border border-slate-800/80 text-xs md:text-sm text-slate-300 hover:bg-slate-900 hover:border-slate-700/80 transition-all duration-200';
        optBtn.innerText = t(opt.text);
        optBtn.onclick = () => submitScenario(idx, branch.scenario.options, data.themeColor);
        optionsContainer.appendChild(optBtn);
      });
    }

    // 9. 提報情境答案與解析
    function submitScenario(selectedIndex, options, themeColor) {
      const feedbackEl = document.getElementById('scenario-feedback');
      const optionButtons = document.querySelectorAll('#scenario-options button');
      const selectedOpt = options[selectedIndex];

      optionButtons.forEach((btn, idx) => {
        btn.className = 'w-full text-left p-3.5 rounded-xl text-xs md:text-sm transition-all duration-200 ';
        if (idx === selectedIndex) {
          if (selectedOpt.correct) {
            btn.classList.add('bg-emerald-950/40', 'border-emerald-500/80', 'text-emerald-300');
          } else {
            btn.classList.add('bg-rose-950/40', 'border-rose-500/80', 'text-rose-300');
          }
        } else {
          btn.classList.add('bg-slate-900/40', 'border-slate-800/40', 'text-slate-500', 'cursor-not-allowed');
          btn.disabled = true;
        }
      });

      feedbackEl.className = 'block rounded-xl p-4 text-xs md:text-sm leading-relaxed transition-all duration-300 ';
      
      const correctLabel = uiTranslations[currentLang].answerCorrect;
      const analysisLabel = uiTranslations[currentLang].answerAnalysis;
      const retryLabel = uiTranslations[currentLang].retryBtn;

      if (selectedOpt.correct) {
        feedbackEl.classList.add('bg-emerald-950/30', 'border', 'border-emerald-500/30', 'text-emerald-300');
        feedbackEl.innerHTML = `<i class="fa-solid fa-circle-check text-base mr-1.5 align-middle"></i> <strong>${correctLabel}</strong> ${t(selectedOpt.reason)}`;
      } else {
        feedbackEl.classList.add('bg-rose-950/30', 'border', 'border-rose-500/30', 'text-rose-300');
        feedbackEl.innerHTML = `<i class="fa-solid fa-circle-xmark text-base mr-1.5 align-middle"></i> <strong>${analysisLabel}</strong> ${t(selectedOpt.reason)}`;
        
        const retryBtn = document.createElement('button');
        retryBtn.className = `mt-3 block text-xs bg-slate-900 hover:bg-slate-850 border border-slate-800 px-3 py-1.5 rounded-lg text-slate-300 font-medium transition-colors`;
        retryBtn.innerText = retryLabel;
        retryBtn.onclick = () => { selectBranch(activeBranchId); };
        feedbackEl.appendChild(retryBtn);
      }
    }

    // 10. 繪製動態 SVG 連接線 (響應式完美定位)
    function drawConnections() {
      const canvas = document.getElementById('svg-canvas');
      const hub = document.getElementById('central-hub');
      const childNodes = document.querySelectorAll('#nodes-grid button');

      if (!canvas || !hub || childNodes.length === 0) return;

      canvas.innerHTML = '';

      const canvasRect = canvas.getBoundingClientRect();
      const hubRect = hub.getBoundingClientRect();

      // 計算中心點
      const startX = hubRect.left + hubRect.width / 2 - canvasRect.left;
      const startY = hubRect.bottom - canvasRect.top;

      childNodes.forEach(child => {
        const childRect = child.getBoundingClientRect();
        
        // 計算子節點頂部起點
        const endX = childRect.left + childRect.width / 2 - canvasRect.left;
        const endY = childRect.top - canvasRect.top;

        const childId = child.id.replace('node-', '');
        const isSelected = (childId === activeBranchId);

        // 建立貝氏曲線
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const midY = (startY + endY) / 2;
        const d = `M ${startX} ${startY} C ${startX} ${midY}, ${endX} ${midY}, ${endX} ${endY}`;
        
        path.setAttribute('d', d);
        path.setAttribute('fill', 'none');

        const activeColor = domainDatabase[currentDomainKey].hexColor;

        if (isSelected) {
          path.setAttribute('stroke', activeColor);
          path.setAttribute('stroke-width', '2.5');
          path.setAttribute('class', 'active-connection-line opacity-100 transition-all duration-300');
          
          const glowPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          glowPath.setAttribute('d', d);
          glowPath.setAttribute('fill', 'none');
          glowPath.setAttribute('stroke', activeColor);
          glowPath.setAttribute('stroke-width', '6');
          glowPath.setAttribute('class', 'opacity-20 blur-sm pointer-events-none');
          canvas.appendChild(glowPath);
        } else {
          path.setAttribute('stroke', '#1e293b');
          path.setAttribute('stroke-width', '1.5');
          path.setAttribute('stroke-dasharray', '4,4');
          path.setAttribute('class', 'opacity-40 transition-all duration-300');
        }

        canvas.appendChild(path);
      });
    }

    // 11. 跨領域/語言智能搜尋引擎 (模糊多語言檢索)
    function handleGlobalSearch(query) {
      const dropdown = document.getElementById('search-results-dropdown');
      if (!query) {
        dropdown.classList.add('hidden');
        dropdown.innerHTML = '';
        return;
      }

      const q = query.toLowerCase();
      const results = [];

      // 橫跨三大領域、全語言庫索引
      Object.keys(domainDatabase).forEach(domainKey => {
        const domain = domainDatabase[domainKey];
        Object.keys(domain.branches).forEach(branchId => {
          const branch = domain.branches[branchId];
          
          // 將中文、英文、法文之資訊全數彙整，建立全語系索引
          const textPool = [
            branch.title.zh, branch.title.en, branch.title.fr,
            branch.englishTitle.zh, branch.englishTitle.en, branch.englishTitle.fr,
            branch.description.zh, branch.description.en, branch.description.fr,
            ...branch.subfields.flatMap(s => [s.name.zh, s.name.en, s.name.fr, s.desc.zh, s.desc.en, s.desc.fr]),
            ...branch.skills.flatMap(s => [s.zh, s.en, s.fr]),
            ...branch.tools
          ].join(' ').toLowerCase();

          if (textPool.includes(q)) {
            results.push({
              domainKey: domainKey,
              branchId: branchId,
              title: branch.title,
              englishTitle: branch.englishTitle,
              themeColor: domain.themeColor,
              domainName: {
                zh: domainKey === 'finance' ? '金融學' : domainKey === 'accounting' ? '會計學' : '市場行銷',
                en: domainKey === 'finance' ? 'Finance' : domainKey === 'accounting' ? 'Accounting' : 'Marketing',
                fr: domainKey === 'finance' ? 'Finance' : domainKey === 'accounting' ? 'Comptabilité' : 'Marketing'
              }
            });
          }
        });
      });

      // 渲染聯想選單
      if (results.length > 0) {
        dropdown.classList.remove('hidden');
        
        const resultsLabel = uiTranslations[currentLang].searchResults;
        const clickToJumpLabel = uiTranslations[currentLang].clickToJump;

        dropdown.innerHTML = `
          <div class="p-2 border-b border-slate-800/60 flex items-center justify-between sticky top-0 bg-slate-950 z-10">
            <span class="text-[10px] text-slate-500 font-semibold tracking-wider uppercase">${resultsLabel} (${results.length})</span>
            <span class="text-[10px] text-teal-400 font-bold">${clickToJumpLabel}</span>
          </div>
        `;

        results.forEach(res => {
          const row = document.createElement('button');
          row.className = 'w-full text-left px-3.5 py-3 hover:bg-slate-900/60 flex items-center justify-between border-b border-slate-900 last:border-0 transition-colors gap-3';
          row.onclick = () => {
            // 自動跳轉至對應學科與分支
            switchDomain(res.domainKey);
            selectBranch(res.branchId);
            
            // 滾動導航到詳細解析卡片
            document.getElementById('detail-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
            
            // 隱藏搜尋結果
            dropdown.classList.add('hidden');
            document.getElementById('global-search-input').value = '';
          };

          row.innerHTML = `
            <div>
              <div class="text-xs font-bold text-slate-200">${t(res.title)}</div>
              <div class="text-[10px] text-slate-400 mt-0.5 truncate max-w-[180px]">${t(res.englishTitle)}</div>
            </div>
            <span class="text-[10px] px-2 py-0.5 font-bold rounded bg-${res.themeColor}-500/10 text-${res.themeColor}-400 border border-${res.themeColor}-500/20 whitespace-nowrap">
              ${t(res.domainName)}
            </span>
          `;
          dropdown.appendChild(row);
        });
      } else {
        dropdown.classList.remove('hidden');
        dropdown.innerHTML = `
          <div class="p-4 text-center text-xs text-slate-500">
            ${uiTranslations[currentLang].noResults}
          </div>
        `;
      }
    }
  </script>
