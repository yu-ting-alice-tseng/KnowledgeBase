<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonita's Knowledge Galaxy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #060913; --card-bg: rgba(15, 23, 42, 0.6); }
        body {
            background-color: var(--bg-color);
            font-family: 'Nunito', sans-serif;
            color: #e2e8f0;
            background-image:
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.05) 0px, transparent 50%);
            min-height: 100vh;
        }
        .serif-title { font-family: 'Playfair Display', serif; }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            position: relative;
        }
        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(56,189,248,0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(56,189,248,0.1);
        }
        .glass-card.edit-mode:hover {
            transform: none;
            box-shadow: none;
        }

        /* Delete button on card */
        .delete-btn {
            display: none;
            position: absolute;
            top: 12px; right: 12px;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.35);
            color: #f87171;
            font-size: 11px;
            align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }
        .delete-btn:hover { background: rgba(239,68,68,0.35); color: #fff; }
        body.edit-mode .delete-btn { display: flex; }
        body.edit-mode .glass-card { cursor: default; border-color: rgba(239,68,68,0.2); }
        body.edit-mode .glass-card:hover { transform: none; box-shadow: none; border-color: rgba(239,68,68,0.35); }

        /* Search bar */
        #search-wrap { position: relative; max-width: 480px; margin: 0 auto 48px; }
        #search-input {
            width: 100%;
            background: rgba(15,23,42,0.7);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 12px 48px 12px 44px;
            color: #e2e8f0;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            backdrop-filter: blur(8px);
        }
        #search-input::placeholder { color: #475569; }
        #search-input:focus { border-color: rgba(56,189,248,0.4); box-shadow: 0 0 0 3px rgba(56,189,248,0.08); }
        #search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 13px; pointer-events: none; }
        #search-clear { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 12px; cursor: pointer; display: none; }
        #search-clear:hover { color: #94a3b8; }

        /* Toolbar */
        #toolbar { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; }
        .tool-btn {
            display: flex; align-items: center; gap: 7px;
            padding: 9px 18px; border-radius: 12px;
            font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
            cursor: pointer; transition: all 0.2s;
            font-family: 'Nunito', sans-serif;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15,23,42,0.6);
            color: #94a3b8;
        }
        .tool-btn:hover { color: #e2e8f0; border-color: rgba(255,255,255,0.2); background: rgba(15,23,42,0.9); }
        .tool-btn.active { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.35); color: #f87171; }
        #upload-btn { color: #67e8f9; border-color: rgba(103,232,249,0.25); background: rgba(103,232,249,0.05); }
        #upload-btn:hover { background: rgba(103,232,249,0.12); border-color: rgba(103,232,249,0.45); color: #e0f2fe; }

        /* Add module modal */
        #add-modal {
            display: none; position: fixed; inset: 0; z-index: 300;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
            align-items: center; justify-content: center;
        }
        #add-modal.open { display: flex; }
        #modal-box {
            background: #0d1526;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 36px;
            width: 100%; max-width: 460px;
            position: relative;
        }
        .modal-label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: #64748b; text-transform: uppercase; margin-bottom: 6px; }
        .modal-input {
            width: 100%; background: rgba(15,23,42,0.8); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 10px 14px; color: #e2e8f0;
            font-family: 'Nunito', sans-serif; font-size: 13px; outline: none;
            transition: border-color 0.2s; margin-bottom: 16px;
        }
        .modal-input:focus { border-color: rgba(56,189,248,0.4); }
        #drop-zone {
            border: 2px dashed rgba(56,189,248,0.25); border-radius: 14px;
            padding: 28px; text-align: center; color: #475569;
            cursor: pointer; transition: all 0.2s; margin-bottom: 20px;
            font-size: 13px;
        }
        #drop-zone.dragging, #drop-zone:hover { border-color: rgba(56,189,248,0.6); color: #94a3b8; background: rgba(56,189,248,0.04); }
        #drop-zone .file-chosen { color: #67e8f9; font-weight: 600; }

        /* Color picker row */
        .color-opts { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .color-opt {
            width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
            border: 2px solid transparent; transition: all 0.15s;
        }
        .color-opt.selected { border-color: #fff; transform: scale(1.15); }

        /* Module viewer */
        #module-viewer {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: var(--bg-color); animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* No results */
        #no-results { display: none; grid-column: 1/-1; text-align: center; color: #475569; padding: 48px 0; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12">

<div class="max-w-7xl mx-auto">
    <!-- Header -->
    <header class="mb-12 text-center">
        <div class="inline-block p-1 px-3 mb-4 rounded-full bg-sky-500/10 border border-sky-500/20 text-sky-400 text-xs font-bold tracking-widest uppercase">
            Personal Portfolio Hub
        </div>
        <h1 class="serif-title text-5xl md:text-7xl font-black text-white mb-6 tracking-tight">
            Knowledge <span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-pink-500">Galaxy</span>
        </h1>
        <p class="text-slate-400 max-w-2xl mx-auto text-lg">
            A curated repository of cross-domain research, mind maps, and interactive tools.
        </p>
    </header>

    <!-- Search bar -->
    <div id="search-wrap">
        <i class="fa-solid fa-magnifying-glass" id="search-icon"></i>
        <input id="search-input" type="text" placeholder="Search modules…" oninput="handleSearch(this.value)">
        <i class="fa-solid fa-xmark" id="search-clear" onclick="clearSearch()"></i>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
        <button class="tool-btn" id="upload-btn" onclick="openAddModal()">
            <i class="fa-solid fa-plus"></i> Add Module
        </button>
        <button class="tool-btn" id="edit-toggle" onclick="toggleEditMode()">
            <i class="fa-solid fa-pen-to-square"></i> Edit
        </button>
    </div>

    <!-- Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="knowledge-grid">
        <div id="no-results"><i class="fa-solid fa-telescope text-3xl mb-3 block"></i>No modules match your search.</div>
    </div>

    <footer class="mt-24 pt-8 border-t border-slate-800 text-center text-slate-500 text-sm">
        <p>© 2026 Personal Knowledge Base • Interactive Intelligence Architecture</p>
    </footer>
</div>

<!-- Full-screen Viewer -->
<div id="module-viewer">
    <iframe id="viewer-frame" class="w-full h-full border-none" src=""></iframe>
    <button onclick="closeViewer()" title="Back to Knowledge Galaxy"
        style="position:fixed;top:16px;left:16px;z-index:200;display:flex;align-items:center;gap:8px;padding:8px 14px 8px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.12);background:rgba(6,9,19,0.85);backdrop-filter:blur(12px);color:#94a3b8;font-size:12px;font-weight:700;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;font-family:'Nunito',sans-serif;"
        onmouseover="this.style.color='#f8fafc';this.style.borderColor='rgba(255,255,255,0.25)';this.style.background='rgba(15,23,42,0.95)'"
        onmouseout="this.style.color='#94a3b8';this.style.borderColor='rgba(255,255,255,0.12)';this.style.background='rgba(6,9,19,0.85)'">
        <i class="fa-solid fa-chevron-left" style="font-size:10px;"></i> Back
    </button>
</div>

<!-- Add Module Modal -->
<div id="add-modal">
    <div id="modal-box">
        <button onclick="closeAddModal()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:#475569;cursor:pointer;font-size:18px;"><i class="fa-solid fa-xmark"></i></button>
        <h2 style="font-size:18px;font-weight:800;color:#f1f5f9;margin-bottom:24px;">Add New Module</h2>

        <!-- Drop zone -->
        <div id="drop-zone" onclick="document.getElementById('file-input').click()"
             ondragover="event.preventDefault();this.classList.add('dragging')"
             ondragleave="this.classList.remove('dragging')"
             ondrop="handleDrop(event)">
            <i class="fa-solid fa-file-arrow-up" style="font-size:24px;margin-bottom:10px;display:block;color:#38bdf8;"></i>
            <span id="drop-label">Drop an <strong>.html</strong> file here or <u>click to browse</u></span>
            <input type="file" id="file-input" accept=".html" style="display:none" onchange="handleFileSelect(this)">
        </div>

        <label class="modal-label">Module Title</label>
        <input class="modal-input" id="new-title" type="text" placeholder="e.g. Beer Science">

        <label class="modal-label">Subtitle</label>
        <input class="modal-input" id="new-subtitle" type="text" placeholder="e.g. Brewing & Fermentation">

        <label class="modal-label">Description</label>
        <input class="modal-input" id="new-desc" type="text" placeholder="Short description of this module…">

        <label class="modal-label">Icon (FontAwesome class)</label>
        <input class="modal-input" id="new-icon" type="text" placeholder="e.g. fa-book, fa-flask, fa-brain">

        <label class="modal-label">Color Theme</label>
        <div class="color-opts" id="color-opts">
            <div class="color-opt selected" data-grad="from-sky-400 to-blue-600"     style="background:linear-gradient(135deg,#38bdf8,#2563eb)"></div>
            <div class="color-opt"          data-grad="from-emerald-400 to-teal-600" style="background:linear-gradient(135deg,#34d399,#0d9488)"></div>
            <div class="color-opt"          data-grad="from-pink-400 to-rose-600"    style="background:linear-gradient(135deg,#f472b6,#e11d48)"></div>
            <div class="color-opt"          data-grad="from-amber-400 to-orange-600" style="background:linear-gradient(135deg,#fbbf24,#ea580c)"></div>
            <div class="color-opt"          data-grad="from-indigo-400 to-purple-600"style="background:linear-gradient(135deg,#818cf8,#9333ea)"></div>
            <div class="color-opt"          data-grad="from-lime-400 to-green-600"   style="background:linear-gradient(135deg,#a3e635,#16a34a)"></div>
            <div class="color-opt"          data-grad="from-fuchsia-400 to-pink-700" style="background:linear-gradient(135deg,#e879f9,#be185d)"></div>
            <div class="color-opt"          data-grad="from-cyan-400 to-sky-600"     style="background:linear-gradient(135deg,#22d3ee,#0284c7)"></div>
        </div>

        <button onclick="confirmAddModule()"
            style="width:100%;padding:12px;border-radius:12px;background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff;font-weight:800;font-size:13px;letter-spacing:0.05em;border:none;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity 0.2s;"
            onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
            <i class="fa-solid fa-plus" style="margin-right:6px;"></i>Add to Galaxy
        </button>
        <p id="modal-error" style="color:#f87171;font-size:11px;margin-top:10px;display:none;"></p>
    </div>
</div>

<script>
    /* ── Persistent storage ── */
    const STORAGE_KEY = 'knowledge_galaxy_modules';

    const DEFAULT_MODULES = [
        { id:'finance',    title:'Business & Finance',     subtitle:'Cross-Domain Knowledge Map',   description:'Integrated intelligence mapping modern finance, accounting, and marketing strategies.', icon:'fa-building-columns', color:'from-emerald-400 to-teal-600', file:'code_artifact.html',              custom:false },
        { id:'beer',       title:'Zymos: Beer Masterclass',subtitle:'Brewing Science & Styles',     description:'A deep dive into fermentation science, historical brewery lineages, and flavor profiles.', icon:'fa-beer-mug-empty', color:'from-amber-400 to-orange-600', file:'zymos_beer_mind_map.html',          custom:false },
        { id:'skincare',   title:'Skincare Actives',       subtitle:'Science & Market Trends',      description:'Trilingual repository of active ingredients, formulation logic, and industry regulations.', icon:'fa-sparkles', color:'from-pink-400 to-rose-600',    file:'skincare-trilingual.html',          custom:false },
        { id:'perfume',    title:'Perfume Intelligence',   subtitle:'Market Analysis & Brands',     description:'Coty portfolio analysis and perfume market competition mind map.',                        icon:'fa-bottle-droplet', color:'from-indigo-400 to-purple-600', file:'coty_perfume_market_mindmap.html', custom:false },
        { id:'cv-builder', title:'CV Prompt Builder',      subtitle:'Career Engineering Tool',      description:'Advanced AI-driven prompt builder for perfecting CVs and Cover Letters.',                  icon:'fa-file-invoice', color:'from-sky-400 to-blue-600',      file:'cv_prompt_builder_v2.html',        custom:false }
    ];

    function loadModules() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : DEFAULT_MODULES;
        } catch { return DEFAULT_MODULES; }
    }
    function saveModules() { localStorage.setItem(STORAGE_KEY, JSON.stringify(modules)); }

    let modules = loadModules();
    let searchQuery = '';
    let editMode = false;
    let pendingFileURL = null;
    let pendingFileName = null;
    let selectedColor = 'from-sky-400 to-blue-600';

    /* ── Render ── */
    function renderGrid() {
        const grid = document.getElementById('knowledge-grid');
        const noRes = document.getElementById('no-results');
        const q = searchQuery.toLowerCase();
        const filtered = modules.filter(m =>
            !q || m.title.toLowerCase().includes(q) ||
            (m.subtitle||'').toLowerCase().includes(q) ||
            (m.description||'').toLowerCase().includes(q)
        );

        // Remove old cards (keep no-results sentinel)
        grid.querySelectorAll('.glass-card').forEach(c => c.remove());

        if (filtered.length === 0) { noRes.style.display = 'block'; return; }
        noRes.style.display = 'none';

        filtered.forEach(mod => {
            const card = document.createElement('div');
            card.className = 'glass-card rounded-3xl p-8 cursor-pointer group' + (editMode ? ' edit-mode' : '');
            card.dataset.id = mod.id;
            if (!editMode) card.onclick = () => openModule(mod.file, mod.title);

            card.innerHTML = `
                <button class="delete-btn" onclick="deleteModule('${mod.id}',event)" title="Remove module">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <div class="flex justify-between items-start mb-6">
                    <div class="h-14 w-14 rounded-2xl bg-gradient-to-br ${mod.color} flex items-center justify-center text-white text-2xl shadow-lg">
                        <i class="fa-solid ${mod.icon}"></i>
                    </div>
                    <div class="opacity-0 group-hover:opacity-100 transition-opacity text-sky-400">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    </div>
                </div>
                <div>
                    <h3 class="text-2xl font-bold text-white mb-1">${mod.title}</h3>
                    <p class="text-xs font-semibold text-sky-400 tracking-wider uppercase mb-4">${mod.subtitle}</p>
                    <p class="text-slate-400 text-sm leading-relaxed line-clamp-3">${mod.description}</p>
                </div>
                <div class="mt-8 flex items-center gap-2">
                    <div class="h-1.5 w-1.5 rounded-full ${mod.custom ? 'bg-sky-400' : 'bg-emerald-500'} animate-pulse"></div>
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">${mod.custom ? 'Custom Module' : 'Ready to Explore'}</span>
                </div>`;
            grid.appendChild(card);
        });
    }

    /* ── Search ── */
    function handleSearch(val) {
        searchQuery = val;
        document.getElementById('search-clear').style.display = val ? 'block' : 'none';
        renderGrid();
    }
    function clearSearch() {
        document.getElementById('search-input').value = '';
        handleSearch('');
    }

    /* ── Edit mode ── */
    function toggleEditMode() {
        editMode = !editMode;
        document.body.classList.toggle('edit-mode', editMode);
        const btn = document.getElementById('edit-toggle');
        btn.classList.toggle('active', editMode);
        btn.innerHTML = editMode
            ? '<i class="fa-solid fa-check"></i> Done'
            : '<i class="fa-solid fa-pen-to-square"></i> Edit';
        renderGrid();
    }

    function deleteModule(id, e) {
        e.stopPropagation();
        const idx = modules.findIndex(m => m.id === id);
        if (idx === -1) return;
        // Revoke blob URL if custom
        if (modules[idx].custom && modules[idx].file.startsWith('blob:')) {
            URL.revokeObjectURL(modules[idx].file);
        }
        modules.splice(idx, 1);
        saveModules();
        renderGrid();
    }

    /* ── Viewer ── */
    function openModule(file, title) {
        if (editMode) return;
        const viewer = document.getElementById('module-viewer');
        document.getElementById('viewer-frame').src = file;
        document.body.style.overflow = 'hidden';
        viewer.style.display = 'block';
    }
    function closeViewer() {
        document.getElementById('module-viewer').style.display = 'none';
        document.getElementById('viewer-frame').src = '';
        document.body.style.overflow = 'auto';
    }

    /* ── Add modal ── */
    function openAddModal() {
        document.getElementById('add-modal').classList.add('open');
        document.getElementById('drop-label').innerHTML = 'Drop an <strong>.html</strong> file here or <u>click to browse</u>';
        document.getElementById('new-title').value = '';
        document.getElementById('new-subtitle').value = '';
        document.getElementById('new-desc').value = '';
        document.getElementById('new-icon').value = 'fa-file';
        document.getElementById('modal-error').style.display = 'none';
        pendingFileURL = null; pendingFileName = null;
        selectColor('from-sky-400 to-blue-600');
    }
    function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); }

    function handleDrop(e) {
        e.preventDefault();
        document.getElementById('drop-zone').classList.remove('dragging');
        const file = e.dataTransfer.files[0];
        if (file) processFile(file);
    }
    function handleFileSelect(input) {
        if (input.files[0]) processFile(input.files[0]);
    }
    function processFile(file) {
        if (!file.name.endsWith('.html')) {
            showModalError('Please select an .html file.'); return;
        }
        if (pendingFileURL) URL.revokeObjectURL(pendingFileURL);
        pendingFileURL = URL.createObjectURL(file);
        pendingFileName = file.name;
        document.getElementById('drop-label').innerHTML = `<span class="file-chosen"><i class="fa-solid fa-check" style="margin-right:5px;"></i>${file.name}</span>`;
        // Auto-fill title from filename
        if (!document.getElementById('new-title').value) {
            document.getElementById('new-title').value = file.name.replace('.html','').replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
        }
    }

    function confirmAddModule() {
        const title = document.getElementById('new-title').value.trim();
        const subtitle = document.getElementById('new-subtitle').value.trim();
        const desc = document.getElementById('new-desc').value.trim();
        const icon = document.getElementById('new-icon').value.trim() || 'fa-file';

        if (!pendingFileURL) { showModalError('Please upload an HTML file first.'); return; }
        if (!title) { showModalError('Please enter a module title.'); return; }

        const id = 'custom_' + Date.now();
        modules.push({ id, title, subtitle: subtitle||'Custom Module', description: desc||'', icon, color: selectedColor, file: pendingFileURL, custom: true });
        saveModules();
        renderGrid();
        closeAddModal();
    }

    function showModalError(msg) {
        const el = document.getElementById('modal-error');
        el.textContent = msg; el.style.display = 'block';
    }

    /* ── Color picker ── */
    document.getElementById('color-opts').addEventListener('click', e => {
        const opt = e.target.closest('.color-opt');
        if (opt) selectColor(opt.dataset.grad);
    });
    function selectColor(grad) {
        selectedColor = grad;
        document.querySelectorAll('.color-opt').forEach(o => o.classList.toggle('selected', o.dataset.grad === grad));
    }

    /* ── Keys ── */
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            if (document.getElementById('module-viewer').style.display === 'block') closeViewer();
            else closeAddModal();
        }
    });

    /* ── Boot ── */
    renderGrid();
</script>
</body>
</html>
