<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliotheca · Knowledge Library</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Cormorant+SC:wght@300;400;500;600&family=Nunito:wght@300;400;500;600;700;800&family=Noto+Serif+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tokens ── */
:root {
  --bg:         #0b0806;
  --bg2:        #100d09;
  --gold:       #c9a85c;
  --gold-hi:    #e8cc84;
  --gold-lo:    rgba(201,168,92,0.40);
  --gold-faint: rgba(201,168,92,0.12);
  --cream:      #ede2cc;
  --cream2:     #b8a48a;
  --muted:      #5e4e38;
  --muted2:     #3a2e20;

  /* glass layers */
  --gl-base:    rgba(255,243,210,0.055);
  --gl-hover:   rgba(255,243,210,0.095);
  --gl-border:  rgba(201,168,92,0.18);
  --gl-border-h:rgba(201,168,92,0.42);
  --gl-shine:   rgba(255,248,220,0.90);
  --gl-fresnel: rgba(255,246,215,0.08);
}

html, body { height: 100%; }

body {
  background: var(--bg);
  font-family: 'Nunito', 'Noto Serif TC', sans-serif;
  color: var(--cream);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── Fixed layer stack (z 0-9) ─── */

/* Vignette */
#vignette {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background:
    radial-gradient(ellipse 90% 80% at 50% 40%, transparent 35%, rgba(0,0,0,0.62) 100%),
    radial-gradient(ellipse 60% 50% at 50% 100%, rgba(0,0,0,0.5) 0%, transparent 100%);
}

/* Shelf lines */
#shelves {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background-image:
    linear-gradient(0deg,
      transparent 0%,
      transparent calc(32vh - 1px),
      rgba(90,62,28,0.13) calc(32vh - 1px),
      rgba(90,62,28,0.13) calc(32vh),
      rgba(50,35,15,0.07) calc(32vh),
      rgba(50,35,15,0.07) calc(32vh + 2px),
      transparent calc(32vh + 2px),
      transparent calc(65vh - 1px),
      rgba(90,62,28,0.10) calc(65vh - 1px),
      rgba(90,62,28,0.10) calc(65vh),
      rgba(50,35,15,0.05) calc(65vh),
      rgba(50,35,15,0.05) calc(65vh + 2px),
      transparent calc(65vh + 2px),
      transparent 100%
    );
}

/* Ambient reading-lamp orbs */
.orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
.o1 { width:900px;height:900px;top:-320px;left:-250px;
      background:radial-gradient(circle,rgba(215,148,35,0.22) 0%,transparent 62%);filter:blur(115px); }
.o2 { width:600px;height:600px;top:-120px;right:-180px;
      background:radial-gradient(circle,rgba(185,112,28,0.14) 0%,transparent 62%);filter:blur(95px); }
.o3 { width:700px;height:700px;bottom:-220px;left:18%;
      background:radial-gradient(circle,rgba(28,72,95,0.16) 0%,transparent 62%);filter:blur(105px); }
.o4 { width:450px;height:450px;bottom:60px;right:-100px;
      background:radial-gradient(circle,rgba(100,50,120,0.09) 0%,transparent 62%);filter:blur(85px); }
.o5 { width:1000px;height:1000px;top:30%;left:42%;transform:translate(-50%,-50%);
      background:radial-gradient(circle,rgba(168,108,22,0.052) 0%,transparent 65%);filter:blur(140px); }

/* Dust motes */
#dust { position: fixed; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; }
.mote {
  position: absolute;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: rgba(255,235,165,0.55);
  animation: float-up linear infinite;
  will-change: transform, opacity;
}
@keyframes float-up {
  0%   { transform: translateY(0) translateX(0) scale(0.5); opacity: 0; }
  8%   { opacity: 1; }
  88%  { opacity: 0.6; }
  100% { transform: translateY(-105vh) translateX(var(--dx,20px)) scale(1.2); opacity: 0; }
}

/* ─── Layout ─── */
#wrap { position: relative; z-index: 10; max-width: 1280px; margin: 0 auto; padding: 52px 48px 80px; }
@media(max-width:680px){ #wrap { padding: 36px 20px 60px; } }

/* ─── Header ─── */
#header { text-align: center; margin-bottom: 80px; position: relative; }

/* Monogram seal */
#seal {
  width: 58px; height: 58px; border-radius: 50%;
  background: linear-gradient(145deg, rgba(201,168,92,0.22), rgba(140,100,40,0.12));
  border: 1px solid rgba(201,168,92,0.30);
  box-shadow:
    0 0 0 4px rgba(201,168,92,0.07),
    0 0 0 8px rgba(201,168,92,0.03),
    inset 0 1px 0 rgba(255,238,165,0.28),
    inset 0 -1px 0 rgba(0,0,0,0.25);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 26px;
  font-family: 'Cormorant SC', serif;
  font-size: 20px; font-weight: 500;
  color: var(--gold);
  letter-spacing: 0.05em;
  backdrop-filter: blur(12px);
}

/* Eyebrow */
#eyebrow {
  display: inline-flex; align-items: center; gap: 12px;
  margin-bottom: 22px;
}
#eyebrow span.rule { display: block; width: 32px; height: 1px; background: var(--gold-lo); }
#badge-text {
  font-family: 'Cormorant SC', serif;
  font-size: 11px; font-weight: 400; letter-spacing: 0.25em;
  color: var(--gold-lo);
}

/* Main title */
#main-title {
  font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
  font-style: italic;
  font-size: clamp(62px, 9vw, 108px);
  font-weight: 400;
  line-height: 0.95;
  color: #f2e6ce;
  letter-spacing: -2px;
  margin-bottom: 8px;
}
#main-title .gold-word {
  color: var(--gold);
  font-weight: 300;
  display: block;
  padding-left: 0.12em; /* slight indent for second word */
}

/* Ornamental divider */
.orn-div {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  margin: 24px auto 20px; max-width: 280px;
}
.orn-div .lr { flex: 1; height: 1px; }
.orn-div .lr-l { background: linear-gradient(to right, transparent, rgba(201,168,92,0.45)); }
.orn-div .lr-r { background: linear-gradient(to left,  transparent, rgba(201,168,92,0.45)); }
.orn-div .gem { color: var(--gold); font-size: 9px; opacity: 0.6; letter-spacing: 0.4em; }

/* Subtitle */
#page-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-style: italic; font-weight: 300;
  color: var(--cream2); line-height: 1.75; letter-spacing: 0.02em;
  max-width: 420px; margin: 0 auto;
}

/* Lang switcher */
#lang-switch {
  position: absolute; top: 0; right: 0;
  display: flex; gap: 3px; padding: 4px;
  background: rgba(255,242,200,0.038);
  border: 1px solid rgba(201,168,92,0.12);
  border-radius: 11px;
  backdrop-filter: blur(16px);
}
#lang-switch button {
  padding: 5px 13px;
  font-size: 10px; font-weight: 800; letter-spacing: 0.06em;
  border-radius: 7px; border: none; cursor: pointer;
  font-family: 'Nunito', sans-serif; transition: all .22s;
  background: transparent; color: var(--muted);
}
#lang-switch button.active { background: rgba(201,168,92,0.18); color: var(--gold); }

/* ─── Collection heading ─── */
#collection-header {
  display: flex; align-items: center; gap: 18px;
  margin-bottom: 32px;
}
#collection-header .col-label {
  font-family: 'Cormorant SC', serif;
  font-size: 11px; font-weight: 400; letter-spacing: 0.30em;
  color: var(--muted); white-space: nowrap;
}
#collection-header .col-rule {
  flex: 1; height: 1px;
  background: linear-gradient(to right, rgba(201,168,92,0.20), transparent);
}
#collection-header .col-count {
  font-size: 10px; font-weight: 700; color: var(--muted2);
  font-family: 'Nunito', sans-serif; letter-spacing: 0.08em;
}

/* ─── Search ─── */
#search-wrap { position: relative; max-width: 520px; margin: 0 auto 28px; }
#search-input {
  width: 100%;
  background: rgba(255,242,200,0.042);
  backdrop-filter: blur(32px) saturate(160%);
  border: 1px solid rgba(201,168,92,0.17);
  border-radius: 14px;
  padding: 13px 48px 13px 46px;
  color: var(--cream);
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 500;
  outline: none; transition: all 0.25s;
  box-shadow: inset 0 1px 0 rgba(255,235,160,0.10), 0 6px 22px rgba(0,0,0,0.25);
}
#search-input::placeholder { color: var(--muted); font-style: italic; }
#search-input:focus {
  border-color: rgba(201,168,92,0.40);
  background: rgba(255,242,200,0.072);
  box-shadow: 0 0 0 3px rgba(201,168,92,0.09),
              inset 0 1px 0 rgba(255,235,160,0.15),
              0 6px 22px rgba(0,0,0,0.25);
}
#search-icon { position: absolute; left: 17px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 11px; pointer-events: none; }
#search-clear { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 11px; cursor: pointer; display: none; transition: color .2s; }
#search-clear:hover { color: var(--cream); }

/* ─── Toolbar ─── */
#toolbar { display: flex; justify-content: center; gap: 8px; margin-bottom: 52px; }
.tool-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 18px; border-radius: 11px;
  font-size: 10px; font-weight: 800; letter-spacing: 0.10em; text-transform: uppercase;
  cursor: pointer; transition: all 0.22s;
  font-family: 'Nunito', sans-serif;
  background: rgba(255,242,200,0.036);
  border: 1px solid rgba(201,168,92,0.12);
  color: var(--muted);
  backdrop-filter: blur(14px);
  box-shadow: inset 0 1px 0 rgba(255,235,160,0.06);
}
.tool-btn:hover { color: var(--cream); border-color: rgba(201,168,92,0.28); background: rgba(255,242,200,0.08); }
.tool-btn.active { background: rgba(239,68,68,0.09); border-color: rgba(239,68,68,0.26); color: #f87171; }
#upload-btn { color: var(--gold-lo); border-color: rgba(201,168,92,0.16); }
#upload-btn:hover { color: var(--gold); border-color: rgba(201,168,92,0.38); background: rgba(201,168,92,0.07); }

/* ─── Grid ─── */
#knowledge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 24px; }

/* ─── Liquid Glass Card ─── */
.glass-card {
  position: relative;
  background: var(--gl-base);
  backdrop-filter: blur(48px) saturate(200%) brightness(1.07);
  -webkit-backdrop-filter: blur(48px) saturate(200%) brightness(1.07);
  border-radius: 18px;
  border: 1px solid var(--gl-border);
  box-shadow:
    0 32px 80px rgba(0,0,0,0.62),
    0 10px 28px rgba(0,0,0,0.40),
    /* page-stack right edge */
    3px 3px 0 -1px rgba(20,14,6,0.55),
    5px 6px 0 -2px rgba(20,14,6,0.40),
    7px 9px 0 -3px rgba(20,14,6,0.28),
    /* inner top highlight */
    inset 0 1.5px 0 rgba(255,242,170,0.34),
    /* inner bottom shadow */
    inset 0 -1px 0 rgba(0,0,0,0.30),
    /* inner side warm tint */
    inset 2px 0 10px rgba(255,225,130,0.03),
    inset -2px 0 10px rgba(0,0,0,0.08);
  transition:
    transform 0.10s ease,   /* fast during mouse move */
    box-shadow 0.35s ease,
    border-color 0.28s ease,
    background 0.28s ease;
  overflow: hidden;
  cursor: pointer;
  transform-style: preserve-3d;
  will-change: transform;
}

/* Top specular line */
.glass-card::before {
  content: '';
  position: absolute; top: 0; left: 6%; right: 6%;
  height: 1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(255,242,165,0.55) 20%,
    var(--gl-shine) 50%,
    rgba(255,242,165,0.55) 80%,
    transparent);
  pointer-events: none; z-index: 5;
}

/* Fresnel upper glow */
.glass-card::after {
  content: '';
  position: absolute; top: 1px; left: 1px; right: 1px;
  height: 42%;
  background: linear-gradient(180deg, var(--gl-fresnel) 0%, transparent 100%);
  border-radius: 17px 17px 55% 55% / 17px 17px 26% 26%;
  pointer-events: none; z-index: 4;
}

/* Diagonal refraction band — the key "liquid" feel */
.card-glare {
  position: absolute; inset: 0;
  background: linear-gradient(
    112deg,
    transparent 0%,
    transparent 33%,
    rgba(255,248,215,0.038) 41%,
    rgba(255,252,228,0.060) 49%,
    rgba(255,248,215,0.038) 57%,
    transparent 65%,
    transparent 100%
  );
  border-radius: inherit;
  pointer-events: none; z-index: 3;
  transition: opacity 0.4s;
}
.glass-card:hover .card-glare { opacity: 1.4; }

/* Book spine */
.book-spine {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 5px; border-radius: 18px 0 0 18px;
  z-index: 6;
  box-shadow: inset -1px 0 3px rgba(0,0,0,0.25);
}

/* Page-edge texture on right */
.page-edge {
  position: absolute; right: 0; top: 10px; bottom: 10px;
  width: 4px; border-radius: 0 3px 3px 0;
  z-index: 6;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,248,220,0.20) 0px,
    rgba(255,248,220,0.20) 1px,
    rgba(180,155,110,0.08) 1px,
    rgba(180,155,110,0.08) 2px
  );
}

/* Card content */
.card-body { padding: 28px 30px 28px 38px; position: relative; z-index: 7; }

/* Card entry animation */
@keyframes card-in {
  from { opacity: 0; transform: translateY(22px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)   scale(1); }
}
.glass-card { animation: card-in 0.5s cubic-bezier(0.22,1,0.36,1) both; }

/* Icon box */
.icon-box {
  position: relative;
  width: 50px; height: 50px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; color: #fff;
  box-shadow: 0 8px 28px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.24);
  flex-shrink: 0;
}
.icon-box::after {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  background: linear-gradient(145deg, rgba(255,255,255,0.28) 0%, transparent 55%);
  pointer-events: none;
}

/* Roman numeral chapter marker */
.chapter-num {
  font-family: 'Cormorant SC', serif;
  font-size: 11px; font-weight: 400; letter-spacing: 0.15em;
  color: var(--gold-lo);
}

/* Card title */
.card-title {
  font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
  font-size: 22px; font-weight: 600;
  color: #f3e9d6; letter-spacing: -0.3px; line-height: 1.18;
  margin-bottom: 5px;
}

/* Card subtitle tag */
.card-tag {
  font-size: 9px; font-weight: 800; letter-spacing: 0.14em;
  text-transform: uppercase; color: rgba(201,168,92,0.52);
  font-family: 'Nunito', sans-serif;
}

/* Ruled separator */
.ruled-sep {
  height: 1px;
  background: linear-gradient(90deg, rgba(201,168,92,0.30), rgba(201,168,92,0.10), transparent);
  margin: 14px 0;
}

/* Description */
.card-desc {
  color: var(--muted); font-size: 13px; line-height: 1.70; font-weight: 500;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}

/* Status pill */
.status-pill { display: flex; align-items: center; gap: 6px; margin-top: 20px;
  font-size: 9px; font-weight: 800; letter-spacing: 0.10em;
  text-transform: uppercase; color: var(--muted2); }
.pulse-dot { width: 5px; height: 5px; border-radius: 50%; animation: pulse 2.6s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.42;transform:scale(0.78);} }

/* Open arrow */
.open-arr { opacity: 0; transition: opacity 0.28s; color: rgba(201,168,92,0.45); font-size: 11px; margin-top: 5px; }
.glass-card:hover .open-arr { opacity: 1; }

/* Delete btn */
.delete-btn {
  display: none; position: absolute; top: 12px; right: 14px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(239,68,68,0.11); border: 1px solid rgba(239,68,68,0.28);
  color: #f87171; font-size: 10px;
  align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.18s; z-index: 20;
}
.delete-btn:hover { background: rgba(239,68,68,0.35); color: #fff; transform: scale(1.1); }
body.edit-mode .delete-btn { display: flex; }
body.edit-mode .glass-card { cursor: default; }
body.edit-mode .glass-card:hover { transform: none !important; }

/* ─── No results ─── */
#no-results {
  display: none; grid-column: 1/-1; text-align: center;
  color: var(--muted); padding: 72px 0;
}

/* ─── Add modal ─── */
#add-modal {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.74); backdrop-filter: blur(16px);
  align-items: center; justify-content: center;
}
#add-modal.open { display: flex; }
#modal-box {
  background: rgba(13,10,7,0.93);
  backdrop-filter: blur(52px) saturate(180%);
  border: 1px solid rgba(201,168,92,0.18);
  border-radius: 22px; padding: 40px;
  width: 100%; max-width: 460px; position: relative;
  box-shadow: 0 70px 160px rgba(0,0,0,0.80),
              inset 0 1.5px 0 rgba(255,238,160,0.20);
}
#modal-box::before {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  background: linear-gradient(135deg, rgba(255,242,185,0.04) 0%, transparent 50%);
  pointer-events: none;
}
#modal-box::after {
  content: ''; position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,238,155,0.52) 50%, transparent);
}
.modal-label {
  display: block; font-size: 9px; font-weight: 800;
  letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px;
}
.modal-input {
  width: 100%; background: rgba(255,242,200,0.038); border: 1px solid rgba(201,168,92,0.13);
  border-radius: 10px; padding: 10px 14px; color: var(--cream);
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 500;
  outline: none; transition: all .2s; margin-bottom: 16px;
  box-shadow: inset 0 1px 0 rgba(255,235,160,0.06);
}
.modal-input:focus { border-color: rgba(201,168,92,0.38); background: rgba(255,242,200,0.07); }
#drop-zone {
  border: 1.5px dashed rgba(201,168,92,0.24); border-radius: 14px;
  padding: 28px; text-align: center; color: var(--muted);
  cursor: pointer; transition: all 0.22s; margin-bottom: 20px;
  font-size: 13px; font-weight: 500; background: rgba(201,168,92,0.022);
}
#drop-zone:hover, #drop-zone.dragging {
  border-color: rgba(201,168,92,0.50); color: var(--cream); background: rgba(201,168,92,0.06);
}
#drop-zone .file-chosen { color: var(--gold); font-weight: 700; }
.color-opts { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.color-opt {
  width: 28px; height: 28px; border-radius: 8px;
  cursor: pointer; border: 2px solid transparent; transition: all .16s;
}
.color-opt.selected { border-color: rgba(255,255,255,0.78); transform: scale(1.18); box-shadow: 0 0 10px rgba(255,255,255,0.18); }

/* ─── Module viewer ─── */
#module-viewer {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: var(--bg); animation: slide-up 0.42s cubic-bezier(0.4,0,0.2,1);
}
@keyframes slide-up { from{transform:translateY(8%);opacity:0;} to{transform:translateY(0);opacity:1;} }

/* ─── Footer ─── */
#footer {
  margin-top: 96px; padding-top: 26px;
  border-top: 1px solid rgba(201,168,92,0.09);
  text-align: center;
}
.footer-orn { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 10px; }
.footer-orn .fl { width: 44px; height: 1px; background: linear-gradient(to right,transparent,rgba(201,168,92,0.28)); }
.footer-orn .fr { width: 44px; height: 1px; background: linear-gradient(to left,transparent,rgba(201,168,92,0.28)); }
.footer-orn .fg { color: var(--gold); font-size: 8px; opacity: 0.38; }
#footer-text { color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; }

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(201,168,92,0.15); border-radius: 10px; }

/* ─── Focus ─── */
:focus-visible { outline: 2px solid rgba(201,168,92,0.58); outline-offset: 2px; border-radius: 6px; }
button:focus-visible { outline: 2px solid rgba(201,168,92,0.58); outline-offset: 3px; border-radius: 10px; }

/* ─── Reduced motion ─── */
@media(prefers-reduced-motion:reduce) {
  .glass-card, .tool-btn { transition: none !important; }
  .glass-card:hover { transform: none !important; }

<script>

/* ─── i18n ─── */

  document.getElementById('search-input').placeholder     = u.searchPH;

/* ─── Data ─── */
const STORAGE_KEY = 'knowledge_galaxy_modules';

const SPINE = {
  'from-violet-400 to-indigo-600':  'linear-gradient(180deg,#a78bfa,#4f46e5)',
  'from-emerald-400 to-teal-600':   'linear-gradient(180deg,#34d399,#0d9488)',
  'from-pink-400 to-rose-600':      'linear-gradient(180deg,#f472b6,#e11d48)',
  'from-amber-400 to-orange-500':   'linear-gradient(180deg,#fbbf24,#f97316)',
  'from-sky-400 to-blue-600':       'linear-gradient(180deg,#38bdf8,#2563eb)',
  'from-fuchsia-400 to-purple-700': 'linear-gradient(180deg,#e879f9,#7e22ce)',
  'from-lime-400 to-green-600':     'linear-gradient(180deg,#a3e635,#16a34a)',
  'from-cyan-400 to-sky-600':       'linear-gradient(180deg,#22d3ee,#0284c7)',
};
const GLOW = {
  'from-violet-400 to-indigo-600':  'rgba(139,92,246,0.18)',
  'from-emerald-400 to-teal-600':   'rgba(52,211,153,0.16)',
  'from-pink-400 to-rose-600':      'rgba(244,114,182,0.16)',
  'from-amber-400 to-orange-500':   'rgba(251,191,36,0.16)',
  'from-sky-400 to-blue-600':       'rgba(56,189,248,0.16)',
  'from-fuchsia-400 to-purple-700': 'rgba(232,121,249,0.16)',
  'from-lime-400 to-green-600':     'rgba(163,230,53,0.15)',
  'from-cyan-400 to-sky-600':       'rgba(34,211,238,0.15)',
};
const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX','X',
               'XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX'];

const DEFAULT_MODULES = [
  { id:'finance',    title:'Business & Finance',      subtitle:'Cross-Domain Knowledge Map',
    description:'Integrated intelligence mapping modern finance, accounting, and marketing strategies.',
    icon:'fa-building-columns', color:'from-emerald-400 to-teal-600',
    file:'business-finance-knowledge-map.html', custom:false },
  { id:'beer',       title:'Zymos: Beer Masterclass', subtitle:'Brewing Science & Styles',
    description:'A deep dive into fermentation science, historical brewery lineages, and flavor profiles.',
    icon:'fa-beer-mug-empty',  color:'from-amber-400 to-orange-500',
    file:'zymos_beer_mind_map.html', custom:false },
  { id:'skincare',   title:'Skincare Actives',        subtitle:'Science & Market Trends',
    description:'Trilingual interactive mind map of active ingredients, formulation logic, and regulations.',
    icon:'fa-sparkles',        color:'from-pink-400 to-rose-600',
    file:'skincare-trilingual.html', custom:false },
  { id:'perfume',    title:'Perfume Intelligence',    subtitle:'Market Analysis & Brands',
    description:'Coty portfolio analysis and perfume market competition mind map.',
    icon:'fa-bottle-droplet',  color:'from-fuchsia-400 to-purple-700',
    file:'coty_perfume_market_mindmap.html', custom:false },
  { id:'cv-builder', title:'CV Prompt Builder',       subtitle:'Career Engineering Tool',
    description:'Advanced AI-driven prompt builder for perfecting CVs and Cover Letters.',
    icon:'fa-file-invoice',    color:'from-sky-400 to-blue-600',
    file:'cv_prompt_builder_v2.html', custom:false }
];

function loadModules() {
  try { const s=localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : DEFAULT_MODULES; }
  catch { return DEFAULT_MODULES; }
}
function saveModules() { localStorage.setItem(STORAGE_KEY, JSON.stringify(modules)); }

let modules     = loadModules();
let searchQuery = '';
let editMode    = false;
let pendingURL  = null;
let selColor    = 'from-violet-400 to-indigo-600';

/* ─── Render grid ─── */
function renderGrid() {
  const grid  = document.getElementById('knowledge-grid');
  const noRes = document.getElementById('no-results');
  const q     = searchQuery.toLowerCase();
  const shown = modules.filter(m =>
    !q ||
    m.title.toLowerCase().includes(q) ||
    (m.subtitle||'').toLowerCase().includes(q) ||
    (m.description||'').toLowerCase().includes(q)
  );

  grid.querySelectorAll('.glass-card').forEach(c => c.remove());

  /* update count */
  const cnt = document.getElementById('col-count');
  if (cnt) cnt.textContent = `— ${shown.length} ${UI[currentLang].volumes}`;

  if (!shown.length) { noRes.style.display='block'; return; }
  noRes.style.display = 'none';

  shown.forEach((mod, idx) => {
    const card = document.createElement('div');
    card.className = 'glass-card';
    card.dataset.id = mod.id;
    card.style.animationDelay = (idx * 0.07) + 's';

    const spineGrad = SPINE[mod.color] || SPINE['from-violet-400 to-indigo-600'];
    const glowClr   = GLOW[mod.color]  || 'rgba(139,92,246,0.18)';
    const roman     = ROMAN[idx] || String(idx+1);

    if (!editMode) {
      card.onclick = () => openModule(mod.file);
      card.setAttribute('tabindex','0');
      card.setAttribute('role','button');
      card.setAttribute('aria-label','Open '+mod.title);
      card.onkeydown = e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openModule(mod.file); } };
    }

    card.innerHTML = `
      <button class="delete-btn" onclick="deleteModule('${mod.id}',event)">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <div class="book-spine" style="background:${spineGrad};"></div>
      <div class="page-edge"></div>
      <div class="card-glare"></div>
      <div class="card-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
          <div class="icon-box bg-gradient-to-br ${mod.color}">
            <i class="fa-solid ${mod.icon}"></i>
          </div>
          <div style="text-align:right;">
            <div class="chapter-num">${roman}</div>
            <div class="open-arr"><i class="fa-solid fa-arrow-up-right-from-square"></i></div>
          </div>
        </div>
        <h3 class="card-title">${mod.title}</h3>
        <p class="card-tag">${mod.subtitle}</p>
        <div class="ruled-sep"></div>
        <p class="card-desc">${mod.description}</p>
        <div class="status-pill">
          <div class="pulse-dot"
               style="background:${mod.custom?'#60a5fa':'#a07838'};
                      box-shadow:0 0 6px ${mod.custom?'rgba(96,165,250,.42)':'rgba(160,120,56,.48)'}">
          </div>
          <span>${mod.custom ? UI[currentLang].customStatus : UI[currentLang].readyStatus}</span>
        </div>
      </div>`;

    /* ── 3D book-lift on mouse move ── */
    if (!editMode) {
      let tiltActive = false;

      card.addEventListener('mouseenter', () => {
        tiltActive = true;
        card.style.transition = 'transform 0.08s ease, box-shadow 0.35s ease, border-color 0.28s ease, background 0.28s ease';
        card.style.borderColor = 'var(--gl-border-h)';
        card.style.background  = 'var(--gl-hover)';
        card.style.boxShadow   =
          `0 44px 100px rgba(0,0,0,0.68),`+
          `0 16px 40px rgba(0,0,0,0.44),`+
          `0 0 64px ${glowClr},`+
          `3px 3px 0 -1px rgba(20,14,6,0.50),`+
          `5px 6px 0 -2px rgba(20,14,6,0.36),`+
          `7px 9px 0 -3px rgba(20,14,6,0.24),`+
          `inset 0 1.5px 0 rgba(255,242,170,0.46),`+
          `inset 0 -1px 0 rgba(0,0,0,0.22)`;
      });

      card.addEventListener('mousemove', e => {
        if (!tiltActive) return;
        const r  = card.getBoundingClientRect();
        const x  = (e.clientX - r.left) / r.width  - 0.5;
        const y  = (e.clientY - r.top)  / r.height - 0.5;
        const rX = -y * 9;
        const rY =  x * 7;
        const tY = -13 - Math.abs(y) * 4;
        card.style.transform =
          `translateY(${tY}px) scale(1.018) perspective(900px) rotateX(${rX}deg) rotateY(${rY}deg)`;
      });

      card.addEventListener('mouseleave', () => {
        tiltActive = false;
        card.style.transition = 'transform 0.48s cubic-bezier(0.34,1.2,0.64,1), box-shadow 0.35s ease, border-color 0.28s ease, background 0.28s ease';
        card.style.transform   = '';
        card.style.borderColor = '';
        card.style.background  = '';
        card.style.boxShadow   = '';
      });
    }

    grid.appendChild(card);
  });
}

/* ─── Search ─── */
function handleSearch(val) {
  searchQuery = val;
  document.getElementById('search-clear').style.display = val ? 'block' : 'none';
  renderGrid();
}
function clearSearch() {
  document.getElementById('search-input').value = '';

function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);

  btn.classList.toggle('active', editMode);
  btn.innerHTML = editMode
    ? `<i class="fa-solid fa-check"></i> <span id="edit-btn-text">${UI[currentLang].doneBtn}</span>`
    : `<i class="fa-solid fa-pen-to-square"></i> <span id="edit-btn-text">${UI[currentLang].editBtn}</span>`;
  renderGrid();
}
function deleteModule(id, e) {
  e.stopPropagation();
  const i = modules.findIndex(m => m.id===id);
  if (i===-1) return;
  if (modules[i].custom && modules[i].file.startsWith('blob:')) URL.revokeObjectURL(modules[i].file);
  modules.splice(i,1); saveModules(); renderGrid();
}

/* ─── Viewer ─── */
function openModule(file) {
  if (editMode) return;
  document.getElementById('viewer-frame').src  = file;
  document.body.style.overflow = 'hidden';
  document.getElementById('module-viewer').style.display = 'block';
}
function closeViewer() {
  document.getElementById('module-viewer').style.display = 'none';
  document.getElementById('viewer-frame').src = '';
  document.body.style.overflow = 'auto';
}

/* ─── Modal ─── */
function openAddModal() {
  document.getElementById('add-modal').classList.add('open');
  ['new-title','new-subtitle','new-desc','new-icon'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('drop-label').innerHTML = UI[currentLang].dropLabel;
  document.getElementById('modal-error').style.display = 'none';
  pendingURL = null; selectColor('from-violet-400 to-indigo-600');
}
function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); }
function handleDrop(e) {
  e.preventDefault(); document.getElementById('drop-zone').classList.remove('dragging');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
}
function handleFileSelect(i) { if (i.files[0]) processFile(i.files[0]); }
function processFile(file) {
  if (!file.name.endsWith('.html')) { showModalError('Please select an .html file.'); return; }
  if (pendingURL) URL.revokeObjectURL(pendingURL);
  pendingURL = URL.createObjectURL(file);
  document.getElementById('drop-label').innerHTML =
    `<span class="file-chosen"><i class="fa-solid fa-check" style="margin-right:5px;"></i>${file.name}</span>`;
  if (!document.getElementById('new-title').value)
    document.getElementById('new-title').value =
      file.name.replace('.html','').replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
}
function confirmAddModule() {
  const title = document.getElementById('new-title').value.trim();
  if (!pendingURL) { showModalError('Please upload an HTML file first.'); return; }
  if (!title)      { showModalError('Please enter a title.'); return; }
  modules.push({
    id: 'custom_'+Date.now(), title,
    subtitle:    document.getElementById('new-subtitle').value.trim() || 'Custom Volume',
    description: document.getElementById('new-desc').value.trim() || '',
    icon:        document.getElementById('new-icon').value.trim()  || 'fa-file',
    color:       selColor, file: pendingURL, custom: true
  });
  saveModules(); renderGrid(); closeAddModal();
}
function showModalError(msg) {
  const el=document.getElementById('modal-error'); el.textContent=msg; el.style.display='block';
}

/* ─── Color picker ─── */
document.getElementById('color-opts').addEventListener('click', e => {
  const o = e.target.closest('.color-opt'); if(o) selectColor(o.dataset.grad);
});
function selectColor(g) {
  selColor = g;
  document.querySelectorAll('.color-opt').forEach(o=>o.classList.toggle('selected',o.dataset.grad===g));
}

/* ─── Keyboard ─── */
document.addEventListener('keydown', e => {
  if (e.key==='Escape') {
    if (document.getElementById('module-viewer').style.display==='block') closeViewer();
    else closeAddModal();
  }
});

/* ─── Boot ─── */
/* Tailwind cdn for icon-box gradient classes */
const tw = document.createElement('script');
tw.src = 'https://cdn.tailwindcss.com';
document.head.appendChild(tw);

const saved = localStorage.getItem('kb_lang');
switchLang(['zh','en','fr'].includes(saved) ? saved : 'zh');
</script>
</body>
</html>
