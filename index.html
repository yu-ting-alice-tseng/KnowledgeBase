<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonita's Knowledge Galaxy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #060913;
            --card-bg: rgba(15, 23, 42, 0.6);
        }
        body {
            background-color: var(--bg-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #e2e8f0;
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.05) 0px, transparent 50%);
            min-height: 100vh;
        }
        .serif-title { font-family: 'Playfair Display', serif; }
        
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(56, 189, 248, 0.1);
        }

        /* Module Viewer Overlay */
        #module-viewer {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--bg-color);
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-16 text-center">
            <div class="inline-block p-1 px-3 mb-4 rounded-full bg-sky-500/10 border border-sky-500/20 text-sky-400 text-xs font-bold tracking-widest uppercase">
                Personal Portfolio Hub
            </div>
            <h1 class="serif-title text-5xl md:text-7xl font-black text-white mb-6 tracking-tight">
                Knowledge <span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-pink-500">Galaxy</span>
            </h1>
            <p class="text-slate-400 max-w-2xl mx-auto text-lg">
                A curated repository of cross-domain research, mind maps, and interactive tools.
            </p>
        </header>

        <!-- Knowledge Shelves (Grid) -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="knowledge-grid">
            <!-- Cards will be injected here -->
        </div>

        <!-- Footer -->
        <footer class="mt-24 pt-8 border-t border-slate-800 text-center text-slate-500 text-sm">
            <p>© 2026 Personal Knowledge Base • Interactive Intelligence Architecture</p>
        </footer>
    </div>

    <!-- Full-screen Viewer -->
    <div id="module-viewer">
        <iframe id="viewer-frame" class="w-full h-full border-none" src=""></iframe>
        <!-- Floating back button -->
        <button id="viewer-back" onclick="closeViewer()" title="Back to Knowledge Galaxy"
            style="position:fixed;top:16px;left:16px;z-index:200;display:flex;align-items:center;gap:8px;padding:8px 14px 8px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.12);background:rgba(6,9,19,0.85);backdrop-filter:blur(12px);color:#94a3b8;font-size:12px;font-weight:700;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;font-family:'Plus Jakarta Sans',sans-serif;"
            onmouseover="this.style.color='#f8fafc';this.style.borderColor='rgba(255,255,255,0.25)';this.style.background='rgba(15,23,42,0.95)'"
            onmouseout="this.style.color='#94a3b8';this.style.borderColor='rgba(255,255,255,0.12)';this.style.background='rgba(6,9,19,0.85)'">
            <i class="fa-solid fa-chevron-left" style="font-size:10px;"></i>
            Back
        </button>
    </div>

    <script>
        /**
         * HOW TO ADD NEW CONTENT:
         * Just add a new object to this 'modules' array.
         */
        const modules = [
            {
                id: 'finance',
                title: 'Business & Finance',
                subtitle: 'Cross-Domain Knowledge Map',
                description: 'Integrated intelligence mapping modern finance, accounting, and marketing strategies.',
                icon: 'fa-building-columns',
                color: 'from-emerald-400 to-teal-600',
                file: 'code_artifact.html'
            },
            {
                id: 'beer-science',
                title: 'Zymos: Beer Masterclass',
                subtitle: 'Brewing Science & Styles',
                description: 'A deep dive into fermentation science, historical brewery lineages, and flavor profiles.',
                icon: 'fa-beer-mug-empty',
                color: 'from-amber-400 to-orange-600',
                file: 'zymos_beer_mind_map.html'
            },
            {
                id: 'skincare',
                title: 'Skincare Actives',
                subtitle: 'Science & Market Trends',
                description: 'Trilingual repository of active ingredients, formulation logic, and industry regulations.',
                icon: 'fa-sparkles',
                color: 'from-pink-400 to-rose-600',
                file: 'skincare-trilingual.html'
            },
            {
                id: 'perfume',
                title: 'Perfume Intelligence',
                subtitle: 'Market Analysis & Brands',
                description: 'Coty portfolio analysis and perfume market competition mind map.',
                icon: 'fa-bottle-droplet',
                color: 'from-indigo-400 to-purple-600',
                file: 'coty_perfume_market_mindmap.html'
            },
            {
                id: 'cv-builder',
                title: 'CV Prompt Builder',
                subtitle: 'Career Engineering Tool',
                description: 'Advanced AI-driven prompt builder for perfecting CVs and Cover Letters.',
                icon: 'fa-file-invoice',
                color: 'from-sky-400 to-blue-600',
                file: 'cv_prompt_builder_v2.html'
            }
        ];

        function renderGrid() {
            const grid = document.getElementById('knowledge-grid');
            grid.innerHTML = modules.map(mod => `
                <div class="glass-card rounded-3xl p-8 cursor-pointer group" onclick="openModule('${mod.file}', '${mod.title}')">
                    <div class="flex justify-between items-start mb-6">
                        <div class="h-14 w-14 rounded-2xl bg-gradient-to-br ${mod.color} flex items-center justify-center text-white text-2xl shadow-lg">
                            <i class="fa-solid ${mod.icon}"></i>
                        </div>
                        <div class="opacity-0 group-hover:opacity-100 transition-opacity text-sky-400">
                            <i class="fa-solid fa-arrow-up-right-from-square"></i>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-2xl font-bold text-white mb-1">${mod.title}</h3>
                        <p class="text-xs font-semibold text-sky-400 tracking-wider uppercase mb-4">${mod.subtitle}</p>
                        <p class="text-slate-400 text-sm leading-relaxed line-clamp-3">
                            ${mod.description}
                        </p>
                    </div>
                    
                    <!-- "Joyful" interaction: a little status pill -->
                    <div class="mt-8 flex items-center gap-2">
                        <div class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">Ready to Explore</span>
                    </div>
                </div>
            `).join('');
        }

        function openModule(file, title) {
            const viewer = document.getElementById('module-viewer');
            const frame = document.getElementById('viewer-frame');
            const viewerTitle = document.getElementById('viewer-title');
            
            viewerTitle.innerText = title;
            frame.src = file;
            
            // Disable body scrolling
            document.body.style.overflow = 'hidden';
            
            viewer.style.display = 'block';
        }

        function closeViewer() {
            const viewer = document.getElementById('module-viewer');
            const frame = document.getElementById('viewer-frame');
            
            viewer.style.display = 'none';
            frame.src = '';
            
            // Re-enable body scrolling
            document.body.style.overflow = 'auto';
        }

        // Search filter functionality (Simple implementation)
        // Note: You can expand this if you have dozens of modules.
        function filterModules(query) {
            const cards = document.querySelectorAll('#knowledge-grid > div');
            const q = query.toLowerCase();
            
            modules.forEach((mod, idx) => {
                const isMatch = mod.title.toLowerCase().includes(q) || 
                                mod.description.toLowerCase().includes(q) ||
                                mod.subtitle.toLowerCase().includes(q);
                
                cards[idx].style.display = isMatch ? 'block' : 'none';
            });
        }

        // Handle Escape key to close viewer
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeViewer();
        });

        window.onload = renderGrid;
    </script>
</body>
</html>
