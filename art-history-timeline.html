<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ars Mundi · 世界藝術史時間軸</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Cormorant+SC:wght@300;400;500;600&family=Nunito:wght@300;400;500;600;700;800&family=Noto+Serif+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0b0806;
  --bg2:       #120e0a;
  --gold:      #c9a85c;
  --gold-hi:   #e8cc84;
  --gold-lo:   rgba(201,168,92,0.40);
  --cream:     #ede2cc;
  --cream2:    #b8a48a;
  --muted:     #7a6850;
  --muted2:    #4a3c2a;
  --panel:     rgba(255,243,210,0.045);
  --panel-bd:  rgba(201,168,92,0.16);
}

html, body { min-height: 100%; }
body {
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(120,70,20,0.18), transparent 60%),
    radial-gradient(ellipse 70% 50% at 90% 10%, rgba(60,40,90,0.14), transparent 60%),
    radial-gradient(ellipse 60% 50% at 50% 110%, rgba(20,55,70,0.14), transparent 60%),
    var(--bg);
  color: var(--cream);
  font-family: 'Nunito', 'Noto Serif TC', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

#wrap { max-width: 1220px; margin: 0 auto; padding: 44px 34px 90px; }
@media(max-width:680px){ #wrap { padding: 30px 14px 60px; } }

/* ── Header ── */
header { text-align: center; margin-bottom: 42px; }
.eyebrow {
  display: inline-flex; align-items: center; gap: 12px; margin-bottom: 16px;
}
.eyebrow .rule { width: 34px; height: 1px; background: var(--gold-lo); }
.eyebrow span.txt {
  font-family: 'Cormorant SC', serif; font-size: 11px; letter-spacing: 0.3em; color: var(--gold-lo);
}
h1 {
  font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
  font-style: italic; font-weight: 400;
  font-size: clamp(44px, 7vw, 76px); line-height: 1.02;
  color: #f2e6ce; letter-spacing: -1px;
}
h1 .gold { color: var(--gold); font-weight: 300; }
.subtitle {
  font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
  font-style: italic; font-size: 15.5px; color: var(--cream2);
  margin-top: 14px; line-height: 1.8; max-width: 560px; margin-left: auto; margin-right: auto;
}
.orn { display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 18px; }
.orn .l { width: 56px; height: 1px; background: linear-gradient(to right, transparent, var(--gold-lo)); }
.orn .r { width: 56px; height: 1px; background: linear-gradient(to left, transparent, var(--gold-lo)); }
.orn .g { color: var(--gold); font-size: 9px; opacity: 0.55; }

/* ── Region filter chips ── */
#filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 30px; }
.chip {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 16px; border-radius: 20px; cursor: pointer;
  font-size: 11px; font-weight: 800; letter-spacing: 0.08em;
  font-family: 'Nunito', sans-serif;
  background: var(--panel); border: 1px solid var(--panel-bd);
  color: var(--muted); transition: all .2s; user-select: none;
}
.chip .dot { width: 8px; height: 8px; border-radius: 50%; }
.chip:hover { color: var(--cream); border-color: rgba(201,168,92,0.4); }
.chip.active { color: var(--gold-hi); background: rgba(201,168,92,0.12); border-color: rgba(201,168,92,0.5); }

/* ── Timeline chart ── */
#chart-frame {
  position: relative;
  background: rgba(255,243,210,0.03);
  border: 1px solid var(--panel-bd);
  border-radius: 18px;
  padding: 0;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,242,170,0.14);
  overflow: hidden;
}
#chart-scroll { overflow-x: auto; overflow-y: hidden; padding: 18px 0 6px; }
#chart-scroll::-webkit-scrollbar { height: 8px; }
#chart-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
#chart-scroll::-webkit-scrollbar-thumb { background: rgba(201,168,92,0.25); border-radius: 8px; }
#canvas { position: relative; }

/* era bands */
.era-band { position: absolute; top: 0; bottom: 0; pointer-events: none; }
.era-band.alt { background: rgba(255,240,200,0.022); }
.era-label {
  position: absolute; top: 7px;
  font-family: 'Cormorant SC', serif; font-size: 10.5px; letter-spacing: 0.26em;
  color: rgba(201,168,92,0.62); white-space: nowrap; transform: translateX(12px);
  display: flex; align-items: center; gap: 7px;
}
.era-label::before { content: '✦'; font-size: 7px; opacity: 0.7; }

/* lane */
.lane { position: relative; border-top: 1px dashed rgba(201,168,92,0.10); }
.lane-tag {
  position: sticky; left: 0; float: left;
  margin: 10px 0 0 0; padding: 5px 14px 5px 12px;
  border-radius: 0 14px 14px 0;
  background: linear-gradient(90deg, rgba(11,8,6,0.95), rgba(11,8,6,0.75));
  border: 1px solid rgba(201,168,92,0.22); border-left: none;
  font-size: 11px; font-weight: 800; letter-spacing: 0.14em;
  color: var(--cream2); z-index: 8; display: inline-flex; align-items: center; gap: 7px;
  backdrop-filter: blur(6px);
}
.lane-tag .dot { width: 7px; height: 7px; border-radius: 50%; }

/* movement bar */
.bar {
  position: absolute; height: 40px; border-radius: 20px;
  display: flex; align-items: center; gap: 9px; padding: 0 15px 0 6px;
  cursor: pointer; z-index: 5;
  border: 1px solid rgba(255,255,255,0.20);
  box-shadow:
    0 10px 26px rgba(0,0,0,0.52),
    0 2px 8px rgba(0,0,0,0.4),
    inset 0 1.5px 0 rgba(255,255,255,0.32),
    inset 0 -8px 14px rgba(0,0,0,0.25);
  transition: transform .2s cubic-bezier(.34,1.4,.64,1), box-shadow .28s, opacity .3s, filter .3s;
}
.bar::after {
  content: ''; position: absolute; top: 1.5px; left: 10px; right: 10px; height: 46%;
  border-radius: 18px 18px 45% 45%;
  background: linear-gradient(180deg, rgba(255,255,255,0.26), rgba(255,255,255,0.02));
  pointer-events: none;
}
.bar.slim { padding: 0 12px; gap: 0; }
.bar-thumb {
  width: 29px; height: 29px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
  border: 1.5px solid rgba(255,248,220,0.7);
  box-shadow: 0 2px 7px rgba(0,0,0,0.45), inset 0 0 4px rgba(0,0,0,0.3);
  background: #221a10;
}
.bar-txt { display: flex; flex-direction: column; line-height: 1.2; overflow: hidden; position: relative; z-index: 2; }
.bar-name {
  font-size: 11.5px; font-weight: 800; letter-spacing: 0.04em;
  color: #fffcf0; white-space: nowrap; text-shadow: 0 1px 2px rgba(0,0,0,0.55);
}
.bar-years {
  font-size: 8.5px; font-weight: 700; letter-spacing: 0.08em;
  color: rgba(255,250,230,0.72); white-space: nowrap; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
.bar:hover { transform: translateY(-4px) scale(1.025); z-index: 9; box-shadow: 0 16px 36px rgba(0,0,0,0.6), 0 0 30px var(--glow, rgba(201,168,92,0.3)), inset 0 1.5px 0 rgba(255,255,255,0.4), inset 0 -8px 14px rgba(0,0,0,0.22); }
.bar.selected {
  outline: 2px solid rgba(255,244,200,0.9); outline-offset: 2.5px;
  box-shadow: 0 14px 34px rgba(0,0,0,0.62), 0 0 40px var(--glow, rgba(201,168,92,0.45)),
              inset 0 1.5px 0 rgba(255,255,255,0.38), inset 0 -8px 14px rgba(0,0,0,0.2);
  z-index: 10;
}
.bar.dim { opacity: 0.14; filter: grayscale(0.75); pointer-events: none; }

/* vertical gridlines + era boundaries */
.grid-t {
  position: absolute; top: 26px; bottom: 0; width: 1px; pointer-events: none;
  background: linear-gradient(180deg, transparent, rgba(201,168,92,0.09) 18%, rgba(201,168,92,0.09) 85%, transparent);
}
.era-edge {
  position: absolute; top: 0; bottom: 0; width: 1px; pointer-events: none;
  background: linear-gradient(180deg, rgba(201,168,92,0.38), rgba(201,168,92,0.06) 60%, transparent);
}

/* edge fades on chart frame */
.edge-fade { position: absolute; top: 0; bottom: 0; width: 34px; z-index: 7; pointer-events: none; }
#fade-l { left: 0; background: linear-gradient(to right, rgba(11,8,6,0.8), transparent); border-radius: 18px 0 0 18px; }
#fade-r { right: 0; background: linear-gradient(to left, rgba(11,8,6,0.8), transparent); border-radius: 0 18px 18px 0; }

/* axis */
#axis { position: relative; height: 34px; border-top: 1px solid rgba(201,168,92,0.2); margin-top: 4px; }
.tick { position: absolute; top: 0; }
.tick .tl { width: 1px; height: 7px; background: rgba(201,168,92,0.45); }
.tick .ty {
  margin-top: 5px; transform: translateX(-50%);
  font-size: 10px; font-weight: 700; color: var(--muted); white-space: nowrap;
  font-family: 'Nunito', sans-serif; letter-spacing: 0.04em;
}

/* hint */
#hint {
  text-align: center; margin: 14px 0 34px;
  font-size: 11.5px; color: var(--muted); font-weight: 600; letter-spacing: 0.06em;
}
#hint b { color: var(--gold-lo); font-weight: 800; }

/* ── Tooltip ── */
#tooltip {
  position: fixed; z-index: 90; pointer-events: none; display: none;
  background: rgba(14,10,7,0.95); border: 1px solid rgba(201,168,92,0.35);
  border-radius: 10px; padding: 8px 13px;
  font-size: 11.5px; font-weight: 700; color: var(--cream);
  box-shadow: 0 12px 30px rgba(0,0,0,0.6);
  backdrop-filter: blur(10px); max-width: 260px;
}
#tooltip .yrs { color: var(--gold); font-size: 10.5px; margin-top: 2px; }

/* ── Detail panel ── */
#detail {
  background: rgba(255,243,210,0.04);
  border: 1px solid var(--panel-bd);
  border-radius: 20px;
  padding: 34px 36px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1.5px 0 rgba(255,242,170,0.16);
  position: relative; overflow: hidden;
  animation: fade-in .45s ease both;
}
@keyframes fade-in { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
#detail::before {
  content: ''; position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,238,155,0.4) 50%, transparent);
}
#detail-grid {
  display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 36px; align-items: start;
}
@media(max-width:880px){ #detail-grid { grid-template-columns: 1fr; } }

.d-period {
  font-family: 'Cormorant SC', serif; font-size: 12px; letter-spacing: 0.26em; color: var(--gold);
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}
.d-period .ln { width: 30px; height: 1px; background: var(--gold-lo); }
.d-title {
  font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
  font-size: 34px; font-weight: 600; color: #f3e9d6; line-height: 1.15; letter-spacing: -0.5px;
}
.d-title .en { font-style: italic; font-weight: 300; color: var(--gold); font-size: 21px; margin-left: 10px; }
.d-region-chip {
  display: inline-flex; align-items: center; gap: 7px; margin-top: 12px;
  padding: 5px 13px; border-radius: 16px;
  background: rgba(201,168,92,0.08); border: 1px solid rgba(201,168,92,0.25);
  font-size: 10.5px; font-weight: 800; letter-spacing: 0.12em; color: var(--cream2);
}
.d-region-chip .dot { width: 7px; height: 7px; border-radius: 50%; }
.d-desc { margin-top: 18px; font-size: 14px; line-height: 1.95; color: var(--cream2); font-weight: 500; }
.d-sec-label {
  margin: 22px 0 10px;
  font-size: 9.5px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
  display: flex; align-items: center; gap: 10px;
}
.d-sec-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, rgba(201,168,92,0.2), transparent); }
/* masters & works */
#d-masters { margin-top: 30px; }
.masters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 13px; }
.artist-card {
  background: rgba(255,243,210,0.035);
  border: 1px solid rgba(201,168,92,0.14);
  border-radius: 14px; padding: 17px 19px;
  box-shadow: inset 0 1px 0 rgba(255,242,170,0.09);
  transition: border-color .25s, background .25s, transform .25s;
}
.artist-card:hover { border-color: rgba(201,168,92,0.34); background: rgba(255,243,210,0.055); transform: translateY(-2px); }
.ac-head { display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; }
.ac-name {
  font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
  font-size: 18.5px; font-weight: 600; color: #f0e6cf; letter-spacing: -0.2px;
}
.ac-name a { color: inherit; text-decoration: none; border-bottom: 1px dotted transparent; transition: all .2s; }
.ac-name a:hover { color: var(--gold-hi); border-bottom-color: var(--gold-lo); }
.ac-en { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12.5px; color: var(--gold-lo); }
.ac-years { margin-left: auto; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; color: var(--muted); white-space: nowrap; }
.ac-note { font-size: 12px; line-height: 1.75; color: var(--cream2); margin-top: 7px; font-weight: 500; }
.ac-works { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 11px; }
.work-chip {
  font-size: 11px; font-weight: 700; color: var(--cream2);
  padding: 4px 11px; border-radius: 9px;
  background: rgba(201,168,92,0.06); border: 1px solid rgba(201,168,92,0.16);
}
.work-chip .wy { color: var(--gold-lo); font-size: 9px; margin-left: 4px; letter-spacing: 0.03em; }
.work-chip.feat {
  color: var(--gold-hi); background: rgba(201,168,92,0.15); border-color: rgba(201,168,92,0.45);
  box-shadow: 0 0 12px rgba(201,168,92,0.12);
}

/* mini map */
#minimap-box { margin-top: 6px; }
#minimap { width: 100%; max-width: 340px; display: block; }
#minimap .land { fill: rgba(201,168,92,0.10); stroke: rgba(201,168,92,0.28); stroke-width: 1; transition: fill .4s, filter .4s; }
#minimap .land.lit { fill: var(--lit, rgba(201,168,92,0.55)); filter: drop-shadow(0 0 8px var(--lit, rgba(201,168,92,0.5))); }
.map-caption { font-size: 10px; color: var(--muted); margin-top: 6px; letter-spacing: 0.08em; font-weight: 700; }

/* artwork card */
#art-card {
  background: linear-gradient(160deg, rgba(255,243,210,0.055), rgba(255,243,210,0.02));
  border: 1px solid rgba(201,168,92,0.22);
  border-radius: 16px; padding: 22px;
  box-shadow: 0 18px 50px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,242,170,0.18);
}
#art-frame {
  border: 11px solid #241a0e;
  outline: 1px solid rgba(201,168,92,0.55);
  border-radius: 3px;
  background: #0e0b07;
  box-shadow:
    0 16px 44px rgba(0,0,0,0.6),
    0 4px 14px rgba(0,0,0,0.5),
    inset 0 0 0 1px rgba(201,168,92,0.35),
    inset 0 0 26px rgba(0,0,0,0.6);
  overflow: hidden; position: relative;
}
#art-frame::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  box-shadow: inset 0 2px 12px rgba(0,0,0,0.55), inset 0 -1px 6px rgba(0,0,0,0.4);
}
#art-frame img {
  display: block; width: 100%; max-height: 350px; object-fit: contain;
  background: #0e0b07;
}
#art-frame svg { display: block; width: 100%; height: auto; }
.art-src { font-size: 9.5px; margin-top: 6px; letter-spacing: 0.06em; }
.art-src a { color: var(--gold-lo); text-decoration: none; font-weight: 700; }
.art-src a:hover { color: var(--gold-hi); }
.art-caption { margin-top: 14px; }
.art-title {
  font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
  font-size: 20px; font-weight: 600; color: #f0e6cf;
}
.art-meta { font-size: 11px; font-weight: 700; color: var(--gold-lo); margin-top: 3px; letter-spacing: 0.06em; }
.art-note { font-size: 9.5px; color: var(--muted); margin-top: 6px; letter-spacing: 0.06em; font-style: italic; }
.story-label {
  margin: 16px 0 8px; font-size: 9.5px; font-weight: 800; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--gold-lo);
  display: flex; align-items: center; gap: 9px;
}
.story-label::before { content: '❦'; font-size: 12px; color: var(--gold); opacity: 0.6; }
.art-story { font-size: 13px; line-height: 1.95; color: var(--cream2); font-weight: 500; }

/* nav arrows */
#d-nav { display: flex; gap: 8px; position: absolute; top: 24px; right: 26px; z-index: 5; }
.nav-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,243,210,0.05); border: 1px solid rgba(201,168,92,0.22);
  color: var(--cream2); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; font-family: inherit;
}
.nav-btn:hover { color: var(--gold-hi); border-color: rgba(201,168,92,0.5); background: rgba(201,168,92,0.1); }

/* footer */
footer { margin-top: 60px; text-align: center; }
.footer-orn { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 10px; }
.footer-orn .fl { width: 44px; height: 1px; background: linear-gradient(to right, transparent, rgba(201,168,92,0.28)); }
.footer-orn .fr { width: 44px; height: 1px; background: linear-gradient(to left, transparent, rgba(201,168,92,0.28)); }
.footer-orn .fg { color: var(--gold); font-size: 8px; opacity: 0.4; }
footer p { color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }

:focus-visible { outline: 2px solid rgba(201,168,92,0.6); outline-offset: 2px; }
@media(prefers-reduced-motion:reduce){ .bar, #detail { transition: none !important; animation: none !important; } }
</style>
</head>
<body>

<div id="wrap">

  <header>
    <div class="eyebrow">
      <span class="rule"></span><span class="txt">個人知識庫 · 藝術卷</span><span class="rule"></span>
    </div>
    <h1>Ars <span class="gold">Mundi</span></h1>
    <div class="orn"><div class="l"></div><span class="g">✦</span><div class="r"></div></div>
    <p class="subtitle">世界藝術史互動時間軸 —— 以四大文化區域為緯、三萬年為經，<br>點選任一流派，展開示意圖與名作背後的故事。</p>
  </header>

  <div id="filters"></div>

  <div id="chart-frame">
    <div id="chart-scroll">
      <div id="canvas"></div>
    </div>
    <div class="edge-fade" id="fade-l"></div>
    <div class="edge-fade" id="fade-r"></div>
  </div>
  <p id="hint">▸ 橫向捲動探索時間軸 · <b>點擊色帶</b>開啟流派詳情 · 上方篩選區域</p>

  <div id="detail" style="display:none;">
    <div id="d-nav">
      <button class="nav-btn" onclick="navMove(-1)" aria-label="上一個流派">‹</button>
      <button class="nav-btn" onclick="navMove(1)" aria-label="下一個流派">›</button>
    </div>
    <div id="detail-grid">
      <div id="d-left"></div>
      <div id="d-right"></div>
    </div>
    <div id="d-masters"></div>
  </div>

  <footer>
    <div class="footer-orn"><div class="fl"></div><span class="fg">✦</span><div class="fr"></div></div>
    <p>© 2026 個人知識庫 · Ars Mundi · 互動藝術史圖譜</p>
  </footer>
</div>

<div id="tooltip"></div>

<script>
/* ═══════════ 資料 ═══════════ */

const REGIONS = {
  europe:   { name: '歐洲',       color: '#8b7cf6', lit: 'rgba(139,124,246,0.65)' },
  eastasia: { name: '東亞',       color: '#f0716f', lit: 'rgba(240,113,111,0.65)' },
  mideast:  { name: '中東 · 非洲', color: '#e3a94f', lit: 'rgba(227,169,79,0.65)' },
  americas: { name: '美洲',       color: '#4fc3a1', lit: 'rgba(79,195,161,0.65)' },
};

/* ═══════════ 時間軸比例（分段線性） ═══════════ */

const SEGS = [
  { from:-32000, to:-3500, pxPerYr: 0.0045 },
  { from:-3500,  to:500,   pxPerYr: 0.055  },
  { from:500,    to:1400,  pxPerYr: 0.34   },
  { from:1400,   to:2032,  pxPerYr: 2.3    },
];
const PAD_L = 26, PAD_R = 40;

function yearToX(y) {
  let x = PAD_L;
  for (const s of SEGS) {
    if (y <= s.from) break;
    const upper = Math.min(y, s.to);
    x += (upper - s.from) * s.pxPerYr;
    if (y <= s.to) break;
  }
  return x;
}
const TOTAL_W = Math.ceil(yearToX(2032)) + PAD_R;

function fmtYear(y) {
  if (y <= -10000) return '約前 ' + (Math.abs(y)/10000) + ' 萬年';
  if (y < 0) return '前 ' + Math.abs(y) + ' 年';
  if (y >= 2024) return '今日';
  return y + ' 年';
}
function fmtRange(m) { return fmtYear(m.start) + ' — ' + fmtYear(m.end); }

/* ═══════════ 建構圖表 ═══════════ */

const ERAS = [
  { name:'史前 PREHISTORY', from:-32000, to:-3500 },
  { name:'古代 ANTIQUITY',  from:-3500,  to:500  },
  { name:'中世紀 MEDIEVAL', from:500,    to:1400 },
  { name:'近世 EARLY MODERN', from:1400, to:1800 },
  { name:'現代 MODERN',     from:1800,   to:2032 },
];
const TICKS = [-30000, -10000, -3000, -1000, 0, 500, 1000, 1400, 1600, 1800, 1900, 2000];
const LANE_ORDER = ['europe', 'eastasia', 'mideast', 'americas'];

const BAR_H = 40, BAR_GAP = 12, LANE_PAD_TOP = 44, LANE_PAD_BOT = 14;

let selectedId = null;
let regionFilter = 'all';

function buildChart() {
  const canvas = document.getElementById('canvas');
  canvas.style.width = TOTAL_W + 'px';
  canvas.innerHTML = '';

  /* era bands + labels */
  const bandLayer = document.createElement('div');
  bandLayer.style.cssText = 'position:absolute;inset:0;pointer-events:none;';
  ERAS.forEach((e, i) => {
    const x1 = yearToX(e.from), x2 = yearToX(e.to);
    const band = document.createElement('div');
    band.className = 'era-band' + (i % 2 ? ' alt' : '');
    band.style.left = x1 + 'px'; band.style.width = (x2 - x1) + 'px';
    bandLayer.appendChild(band);
    const lab = document.createElement('div');
    lab.className = 'era-label';
    lab.style.left = x1 + 'px';
    lab.textContent = e.name;
    bandLayer.appendChild(lab);
    if (i > 0) {
      const edge = document.createElement('div');
      edge.className = 'era-edge';
      edge.style.left = x1 + 'px';
      bandLayer.appendChild(edge);
    }
  });

  /* faint vertical gridlines at each tick */
  TICKS.forEach(t => {
    const g = document.createElement('div');
    g.className = 'grid-t';
    g.style.left = yearToX(t) + 'px';
    bandLayer.appendChild(g);
  });

  /* lanes */
  let html = '';
  const laneWrap = document.createElement('div');
  laneWrap.style.cssText = 'position:relative;padding-top:26px;';

  LANE_ORDER.forEach(rk => {
    const reg = REGIONS[rk];
    const items = MOVEMENTS.filter(m => m.region === rk).sort((a,b) => a.start - b.start);

    /* greedy sub-row allocation */
    const rowEnds = [];
    items.forEach(m => {
      let r = rowEnds.findIndex(end => m.start >= end - 1);
      if (r === -1) { r = rowEnds.length; rowEnds.push(0); }
      rowEnds[r] = m.end;
      m._row = r;
    });
    const nRows = Math.max(rowEnds.length, 1);
    const laneH = LANE_PAD_TOP + nRows * (BAR_H + BAR_GAP) + LANE_PAD_BOT;

    const lane = document.createElement('div');
    lane.className = 'lane';
    lane.style.height = laneH + 'px';
    lane.style.background = 'linear-gradient(90deg, ' + reg.color + '12, transparent 460px)';

    const tag = document.createElement('div');
    tag.className = 'lane-tag';
    tag.innerHTML = '<span class="dot" style="background:' + reg.color + ';box-shadow:0 0 8px ' + reg.color + '"></span>' + reg.name;
    lane.appendChild(tag);

    items.forEach(m => {
      const x1 = yearToX(m.start), x2 = yearToX(m.end);
      const w = Math.max(x2 - x1, 56);
      const bar = document.createElement('div');
      bar.className = 'bar' + (w < 96 ? ' slim' : '');
      bar.dataset.id = m.id;
      bar.dataset.region = m.region;
      bar.style.left = x1 + 'px';
      bar.style.width = w + 'px';
      bar.style.top = (LANE_PAD_TOP + m._row * (BAR_H + BAR_GAP)) + 'px';
      bar.style.background = 'linear-gradient(180deg, ' + m.color + 'f2, ' + m.color + '8c)';
      bar.style.setProperty('--glow', m.color + '66');
      const thumb = (w >= 96)
        ? '<img class="bar-thumb" loading="lazy" alt="" src="' + imgURL(m.art.svg, 96) + '" onerror="this.style.display=\'none\'">'
        : '';
      const years = (w >= 160) ? '<span class="bar-years">' + fmtRange(m) + '</span>' : '';
      bar.innerHTML = thumb + '<span class="bar-txt"><span class="bar-name">' + m.name + '</span>' + years + '</span>';
      bar.setAttribute('role', 'button');
      bar.setAttribute('tabindex', '0');
      bar.setAttribute('aria-label', m.name + '，' + fmtRange(m));
      bar.onclick = () => selectMovement(m.id, true);
      bar.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectMovement(m.id, true); } };
      bar.onmousemove = e => showTip(e, m);
      bar.onmouseleave = hideTip;
      lane.appendChild(bar);
    });

    laneWrap.appendChild(lane);
  });

  /* axis */
  const axis = document.createElement('div');
  axis.id = 'axis';
  TICKS.forEach(t => {
    const tick = document.createElement('div');
    tick.className = 'tick';
    tick.style.left = yearToX(t) + 'px';
    tick.innerHTML = '<div class="tl"></div><div class="ty">' + (t < 0 ? '前' + Math.abs(t) : t) + '</div>';
    axis.appendChild(tick);
  });

  canvas.appendChild(bandLayer);
  canvas.appendChild(laneWrap);
  canvas.appendChild(axis);
}

/* ═══════════ Tooltip ═══════════ */
const tipEl = document.getElementById('tooltip');
function showTip(e, m) {
  tipEl.style.display = 'block';
  tipEl.innerHTML = m.name + ' <span style="opacity:.55;font-weight:600;">' + m.en + '</span><div class="yrs">' + fmtRange(m) + ' · ' + REGIONS[m.region].name + '</div>';
  const pad = 14;
  let x = e.clientX + pad, y = e.clientY + pad;
  const r = tipEl.getBoundingClientRect();
  if (x + r.width > window.innerWidth - 10) x = e.clientX - r.width - pad;
  if (y + r.height > window.innerHeight - 10) y = e.clientY - r.height - pad;
  tipEl.style.left = x + 'px'; tipEl.style.top = y + 'px';
}
function hideTip() { tipEl.style.display = 'none'; }

/* ═══════════ 區域篩選 ═══════════ */
function buildFilters() {
  const box = document.getElementById('filters');
  const mk = (key, label, color) => {
    const c = document.createElement('div');
    c.className = 'chip' + (regionFilter === key ? ' active' : '');
    c.setAttribute('role', 'button'); c.setAttribute('tabindex', '0');
    c.innerHTML = (color ? '<span class="dot" style="background:' + color + ';box-shadow:0 0 8px ' + color + '"></span>' : '✦ ') + label;
    c.onclick = () => setFilter(key);
    c.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setFilter(key); } };
    box.appendChild(c);
  };
  box.innerHTML = '';
  mk('all', '全部區域', null);
  Object.entries(REGIONS).forEach(([k, r]) => mk(k, r.name, r.color));
}
function setFilter(key) {
  regionFilter = key;
  buildFilters();
  document.querySelectorAll('.bar').forEach(b => {
    b.classList.toggle('dim', key !== 'all' && b.dataset.region !== key);
  });
}

/* ═══════════ 詳情面板 ═══════════ */

const MINIMAP = '<svg id="minimap" viewBox="0 0 320 170" xmlns="http://www.w3.org/2000/svg">'
  + '<rect width="320" height="170" rx="10" fill="rgba(255,243,210,0.02)" stroke="rgba(201,168,92,0.14)"/>'
  /* Americas */
  + '<path class="land" data-r="americas" d="M56 28 Q78 20 92 32 Q98 44 88 54 Q94 62 86 72 L74 96 Q70 116 60 132 Q54 118 58 100 L50 78 Q38 66 42 48 Q46 32 56 28 Z"/>'
  /* Europe */
  + '<path class="land" data-r="europe" d="M138 34 Q156 24 176 30 Q188 36 184 48 Q176 58 162 60 Q148 64 140 56 Q132 44 138 34 Z"/>'
  /* Africa + Middle East */
  + '<path class="land" data-r="mideast" d="M148 66 Q168 60 186 66 Q200 62 210 70 Q214 82 206 88 L196 84 Q192 100 180 116 Q172 130 164 118 Q154 100 150 84 Q144 72 148 66 Z"/>'
  /* East Asia */
  + '<path class="land" data-r="eastasia" d="M216 34 Q244 24 268 36 Q282 46 276 62 Q268 76 252 78 Q238 84 228 74 Q214 62 212 48 Q212 38 216 34 Z"/>'
  + '<circle cx="290" cy="96" r="4" class="land" data-r="eastasia"/>'
  + '</svg>';

function esc(s) { return s.replace(/</g, '&lt;'); }

function selectMovement(id, scroll) {
  const m = MOVEMENTS.find(x => x.id === id);
  if (!m) return;
  selectedId = id;

  document.querySelectorAll('.bar').forEach(b => b.classList.toggle('selected', b.dataset.id === id));

  const reg = REGIONS[m.region];
  const dl = document.getElementById('d-left');
  const dr = document.getElementById('d-right');

  dl.innerHTML =
    '<div class="d-period"><span class="ln"></span>' + fmtRange(m) + '</div>'
    + '<h2 class="d-title">' + m.name + '<span class="en">' + m.en + '</span></h2>'
    + '<div class="d-region-chip"><span class="dot" style="background:' + reg.color + ';box-shadow:0 0 8px ' + reg.color + '"></span>發源區域 · ' + reg.name + '</div>'
    + '<p class="d-desc">' + m.desc + '</p>'
    + '<div class="d-sec-label">地理分布 Region</div>'
    + '<div id="minimap-box">' + MINIMAP + '<div class="map-caption">高亮區域為此流派的主要發源地</div></div>';

  const key = m.art.svg;
  dr.innerHTML =
    '<div id="art-card">'
    + '<div id="art-frame">'
    + '<img src="' + imgURL(key, 1000) + '" alt="' + m.art.title + '" '
    + 'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\';">'
    + '<div style="display:none;">' + ART_SVG[key] + '</div>'
    + '</div>'
    + '<div class="art-caption">'
    + '<div class="art-title">《' + m.art.title + '》</div>'
    + '<div class="art-meta">' + m.art.artist + ' · ' + m.art.year + '</div>'
    + '<div class="art-src">圖片來源：<a href="' + imgPage(key) + '" target="_blank" rel="noopener">Wikimedia ↗</a></div>'
    + '<div class="story-label">畫作背景故事</div>'
    + '<p class="art-story">' + m.art.story + '</p>'
    + '</div></div>';

  /* masters & works */
  const masters = MASTERS[m.id] || [];
  document.getElementById('d-masters').innerHTML =
    '<div class="d-sec-label">重要藝術家與代表作 Masters &amp; Masterpieces</div>'
    + '<div class="masters-grid">'
    + masters.map(a =>
        '<div class="artist-card">'
        + '<div class="ac-head">'
        + '<span class="ac-name"><a href="https://zh.wikipedia.org/w/index.php?search=' + encodeURIComponent(a.name) + '" target="_blank" rel="noopener">' + a.name + '</a></span>'
        + (a.en ? '<span class="ac-en">' + a.en + '</span>' : '')
        + '<span class="ac-years">' + a.years + '</span>'
        + '</div>'
        + (a.note ? '<div class="ac-note">' + a.note + '</div>' : '')
        + '<div class="ac-works">'
        + a.works.map(w =>
            '<span class="work-chip' + (w[0] === m.art.title ? ' feat' : '') + '">《' + w[0] + '》'
            + (w[1] ? '<span class="wy">' + w[1] + '</span>' : '') + '</span>'
          ).join('')
        + '</div></div>'
      ).join('')
    + '</div>';

  /* light up minimap */
  const map = document.getElementById('minimap');
  map.style.setProperty('--lit', reg.lit);
  map.querySelectorAll('.land').forEach(p => p.classList.toggle('lit', p.dataset.r === m.region));

  const panel = document.getElementById('detail');
  panel.style.display = 'block';
  panel.style.animation = 'none';
  void panel.offsetWidth;
  panel.style.animation = '';

  if (scroll) panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function navMove(dir) {
  const ordered = [...MOVEMENTS].sort((a, b) => a.start - b.start);
  let i = ordered.findIndex(m => m.id === selectedId);
  i = (i + dir + ordered.length) % ordered.length;
  selectMovement(ordered[i].id, false);
  /* keep bar in view */
  const bar = document.querySelector('.bar[data-id="' + ordered[i].id + '"]');
  if (bar) bar.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

/* ═══════════ Boot ═══════════ */
buildFilters();
buildChart();
selectMovement('renaissance', false);
/* scroll chart to renaissance area on load */
requestAnimationFrame(() => {
  const sc = document.getElementById('chart-scroll');
  sc.scrollLeft = yearToX(1400) - 160;
});
</script>
