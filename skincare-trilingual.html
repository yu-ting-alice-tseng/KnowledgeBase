    height: 100%; overflow: hidden;

  html { height: 100%; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

  #app { display: flex; flex-direction: column; height: 100%; }
  #main { display: flex; flex: 1; overflow: hidden; }

  /* ── Canvas ── */
  #canvas-wrap {
    flex: 1; position: relative; overflow: hidden;
    cursor: grab;
  }
  #canvas-wrap:active { cursor: grabbing; }
  #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #svg-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

  /* ── Nodes ── */
  .node {
    position: absolute; transform: translate(-50%, -50%);
    cursor: pointer; z-index: 10; user-select: none;
    transition: filter .2s;
  }
  .node:hover { filter: brightness(1.2); }
  .node-root {
    width: 110px; height: 110px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #ec4899, #d946ef);
    box-shadow: 0 0 40px rgba(236,72,153,0.5), 0 0 80px rgba(236,72,153,0.2);
    color: #fff; font-weight: 800; font-size: 13px; text-align: center;
    border: 2px solid rgba(255,255,255,0.2);
    line-height: 1.3;
  }
  .node-root i { font-size: 22px; margin-bottom: 5px; }

  .node-branch {
    width: 90px; height: 90px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px; text-align: center; line-height: 1.3;
    border: 2px solid rgba(255,255,255,0.15);
    transition: box-shadow .25s, transform .25s;
  }
  .node-branch:hover { transform: translate(-50%,-50%) scale(1.08) !important; }
  .node-branch i { font-size: 18px; margin-bottom: 4px; }
  .node-branch.active { box-shadow: 0 0 30px var(--node-color), 0 0 60px rgba(0,0,0,0.5) !important; }

  .node-leaf {
    background: rgba(15,23,42,0.85);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 11px; font-weight: 600;
    white-space: nowrap;
    backdrop-filter: blur(8px);
    transition: border-color .2s, box-shadow .2s;
  }
  .node-leaf:hover { border-color: rgba(255,255,255,0.3); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .node-leaf.active { box-shadow: 0 0 0 2px var(--node-color); }

  #detail-panel {
    width: 340px; min-width: 340px;
    background: rgba(10,16,30,0.95);
    border-left: 1px solid rgba(255,255,255,0.07);
    overflow-y: auto;
    transition: width .3s, min-width .3s;
    padding: 0;
    backdrop-filter: blur(12px);

  .detail-tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 12px; }

  .detail-sub { font-size: 12px; color: #64748b; margin-bottom: 20px; }
  .detail-section { margin-bottom: 18px; }
  .detail-section h4 { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #64748b; margin-bottom: 8px; }
  .detail-chip {
    display: inline-block; padding: 5px 11px; border-radius: 10px; font-size: 12px; font-weight: 600;

  .detail-note { font-size: 12px; color: #64748b; font-style: italic; margin-top: 6px; }

    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(15,23,42,0.8); backdrop-filter: blur(8px);

    padding: 8px 18px; font-size: 11px; color: #475569;
    pointer-events: none; white-space: nowrap;
    transition: opacity .4s;
  }
</style>

/* ── STATE ── */
let lang = 'zh';
let transform = { x: 0, y: 0, scale: 1 };
let activeLeaf = null;
let nodePositions = {}; // id → { x, y } in canvas coords

/* ── LAYOUT CONFIG ── */
const ROOT_R = 220; // radius from center to branch node center
const LEAF_R = 130; // radius from branch to leaf

function degToRad(d) { return d * Math.PI / 180; }

function buildLayout(cw, ch) {
  const cx = cw / 2, cy = ch / 2;
  nodePositions = {};
  nodePositions['root'] = { x: cx, y: cy };

  BRANCHES.forEach(branch => {
    const rad = degToRad(branch.angle);
    const bx = cx + ROOT_R * Math.cos(rad);
    const by = cy + ROOT_R * Math.sin(rad);
    nodePositions[branch.id] = { x: bx, y: by };

    const leafCount = branch.leaves.length;
    branch.leaves.forEach((leaf, i) => {
      const spread = leafCount === 1 ? 0 : (i / (leafCount - 1) - 0.5) * 80;
      const leafAngle = branch.angle + spread;
      const lrad = degToRad(leafAngle);
      const lx = bx + LEAF_R * Math.cos(lrad);
      const ly = by + LEAF_R * Math.sin(lrad);
      nodePositions[leaf.id] = { x: lx, y: ly };
    });
  });
}

/* ── RENDER ── */
function render() {
  const wrap = document.getElementById('canvas-wrap');
  const canvas = document.getElementById('canvas');
  const cw = wrap.clientWidth, ch = wrap.clientHeight;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';

  buildLayout(cw, ch);
  canvas.innerHTML = '<svg id="svg-lines" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></svg>';
  const svg = document.getElementById('svg-lines');

  // Draw lines
  function drawLine(x1, y1, x2, y2, color) {
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', color);
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('stroke-opacity', '0.35');
    svg.appendChild(line);
  }

  BRANCHES.forEach(branch => {
    const bp = nodePositions[branch.id];
    const rp = nodePositions['root'];
    drawLine(rp.x, rp.y, bp.x, bp.y, branch.color);
    branch.leaves.forEach(leaf => {
      const lp = nodePositions[leaf.id];
      drawLine(bp.x, bp.y, lp.x, lp.y, branch.color + '99');
    });
  });

  // Root node
  const rp = nodePositions['root'];
  const rootEl = makeEl('div', 'node node-root');
  rootEl.style.left = rp.x + 'px'; rootEl.style.top = rp.y + 'px';
  rootEl.innerHTML = `<i class="fa-solid fa-flask-vial"></i><span>${L[lang].root}</span>`;
  canvas.appendChild(rootEl);

  // Branch & leaf nodes
  BRANCHES.forEach(branch => {
    const bp = nodePositions[branch.id];
    const branchEl = makeEl('div', 'node node-branch');
    branchEl.id = 'node-' + branch.id;
    branchEl.style.left = bp.x + 'px'; branchEl.style.top = bp.y + 'px';
    branchEl.style.setProperty('--node-color', branch.color);
    branchEl.style.background = `radial-gradient(circle at 35% 35%, ${branch.color}33, ${branch.color}11)`;
    branchEl.style.borderColor = branch.color + '55';
    branchEl.style.color = branch.color;
    branchEl.innerHTML = `<i class="fa-solid ${branch.icon}"></i><span>${branch.label[lang]}</span>`;
    canvas.appendChild(branchEl);

    branch.leaves.forEach(leaf => {
      const lp = nodePositions[leaf.id];
      const leafEl = makeEl('div', 'node node-leaf');
      leafEl.id = 'node-' + leaf.id;
      leafEl.style.left = lp.x + 'px'; leafEl.style.top = lp.y + 'px';
      leafEl.style.setProperty('--node-color', branch.color);
      leafEl.style.borderColor = branch.color + '40';
      leafEl.style.color = '#cbd5e1';
      leafEl.textContent = leaf.label[lang];
      leafEl.addEventListener('click', (e) => { e.stopPropagation(); showDetail(leaf, branch.color); });
      canvas.appendChild(leafEl);
    });
  });

  applyTransform();
}

function makeEl(tag, cls) {
  const el = document.createElement(tag);
  el.className = cls; return el;
}

/* ── DETAIL PANEL ── */
function showDetail(leaf, color) {
  activeLeaf = leaf.id;
  document.querySelectorAll('.node-leaf').forEach(n => n.classList.remove('active'));
  const nodeEl = document.getElementById('node-' + leaf.id);
  if (nodeEl) nodeEl.classList.add('active');

  const d = leaf.detail[lang];
  const panel = document.getElementById('detail-panel');
  const inner = document.getElementById('detail-inner');

  let html = `
    <div class="detail-tag" style="background:${color}22;color:${color};">${L[lang].keyIngredients}</div>
    <div class="detail-title">${d.title}</div>
    <div class="detail-sub">${d.sub}</div>`;

  if (d.mechanism) {
    html += `<div class="detail-section">
      <h4>${L[lang].mechanism}</h4>
      <div class="detail-item">${d.mechanism}</div>
    </div>`;
  }
  if (d.ingredients) {
    html += `<div class="detail-section"><h4>${L[lang].keyIngredients}</h4>`;
    d.ingredients.forEach(i => { html += `<span class="detail-chip">${i}</span>`; });
    html += '</div>';
  }
  if (d.items) {
    html += `<div class="detail-section">`;
    d.items.forEach(item => { html += `<div class="detail-item">${item}</div>`; });
    html += '</div>';
  }
  if (d.note) {
    html += `<div class="detail-note">💡 ${d.note}</div>`;
  }

  inner.innerHTML = html;
  panel.classList.remove('hidden');
}

function closePanel() {
  document.getElementById('detail-panel').classList.add('hidden');
  document.querySelectorAll('.node-leaf').forEach(n => n.classList.remove('active'));
  activeLeaf = null;
}

/* ── TRANSFORM ── */
function applyTransform() {
  const canvas = document.getElementById('canvas');
  canvas.style.transform = `translate(${transform.x}px,${transform.y}px) scale(${transform.scale})`;
  canvas.style.transformOrigin = '0 0';
}

/* ── PAN & ZOOM ── */
let isDragging = false, dragStart = { x: 0, y: 0 }, dragOrigin = { x: 0, y: 0 };

document.getElementById('canvas-wrap').addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  isDragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  dragOrigin = { ...transform };
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  transform.x = dragOrigin.x + (e.clientX - dragStart.x);
  transform.y = dragOrigin.y + (e.clientY - dragStart.y);
  applyTransform();
});
window.addEventListener('mouseup', () => { isDragging = false; });

document.getElementById('canvas-wrap').addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  transform.scale = Math.min(2, Math.max(0.35, transform.scale * delta));
  applyTransform();
}, { passive: false });

// Touch support
let lastTouch = null;
document.getElementById('canvas-wrap').addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    dragOrigin = { ...transform };
  }
});
document.getElementById('canvas-wrap').addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isDragging || e.touches.length !== 1) return;
  transform.x = dragOrigin.x + (e.touches[0].clientX - dragStart.x);
  transform.y = dragOrigin.y + (e.touches[0].clientY - dragStart.y);
  applyTransform();
}, { passive: false });
document.getElementById('canvas-wrap').addEventListener('touchend', () => { isDragging = false; });

/* ── LANGUAGE ── */
function switchLang(l) {
  lang = l;
  const hdrBtns = { zh: document.getElementById('hdr-zh'), en: document.getElementById('hdr-en'), fr: document.getElementById('hdr-fr') };
  Object.entries(hdrBtns).forEach(([k, btn]) => {
    if (k === l) { btn.style.background = 'rgba(236,72,153,0.15)'; btn.style.color = '#f0abca'; }
    else { btn.style.background = 'transparent'; btn.style.color = '#64748b'; }
  });
  document.getElementById('nav-title').textContent = L[l].navTitle;
  document.getElementById('tip').textContent = L[l].tip;
  document.documentElement.lang = l === 'zh' ? 'zh-Hant' : l;

  // Re-render with current transform
  render();

  // Re-open detail panel if one was active
  if (activeLeaf) {
    for (const branch of BRANCHES) {
      const leaf = branch.leaves.find(lf => lf.id === activeLeaf);
      if (leaf) { showDetail(leaf, branch.color); break; }
    }
  }
}

/* ── BOOT ── */
window.addEventListener('load', () => { render(); });
window.addEventListener('resize', () => { render(); });
</script>
</body>
</html>
