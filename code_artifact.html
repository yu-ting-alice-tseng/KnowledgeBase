      const list = document.getElementById('domain-dropdown-list');
      list.innerHTML = Object.keys(domainMeta).map(key => {
        const meta = domainMeta[key];
        const color = domainDatabase[key].themeColor;
        const isActive = key === currentDomainKey;
        return `<button onclick="switchDomain('${key}');closeDomainDropdown();"
          class="flex items-center gap-3 w-full px-3 py-2.5 rounded-xl text-sm transition-colors duration-150 ${isActive ? `bg-${color}-500/15 text-${color}-400` : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/60'}">
          <i class="fa-solid ${meta.icon} w-4 text-center shrink-0 ${isActive ? `text-${color}-400` : ''}"></i>
          <span class="font-semibold">${meta.name[currentLang]}</span>
          ${isActive ? '<i class="fa-solid fa-check ml-auto text-xs"></i>' : ''}
        </button>`;
      }).join('');
    }

    function closeDomainDropdown() {
      document.getElementById('domain-dropdown-menu').classList.add('hidden');
      document.getElementById('dd-chevron').style.transform = '';
    }

    function updateDropdownButton() {
      const meta = domainMeta[currentDomainKey];
      const color = domainDatabase[currentDomainKey].themeColor;
      document.getElementById('dd-domain-icon').className = `fa-solid ${meta.icon} text-${color}-400 text-sm w-4 text-center shrink-0`;
      document.getElementById('dd-domain-label').className = `flex-1 text-left text-sm font-bold text-${color}-400`;
      document.getElementById('dd-domain-label').textContent = meta.name[currentLang];
    }

    // 目前選取的領域 & 分支 ID
    let currentDomainKey = 'finance';
    let activeBranchId = 'corporate';

    // 3. 多語言切換的核心控制邏輯
    function setLanguage(lang) {
      if (!uiTranslations[lang]) return;
      currentLang = lang;
      localStorage.setItem('kb_lang', lang);
      
      // 更新語言按鈕樣式
      ['zh', 'en', 'fr'].forEach(l => {
        const btn = document.getElementById(`lang-${l}`);
        if (l === lang) {
          btn.className = "px-2.5 py-1 text-xs font-bold rounded-lg transition-all duration-200 bg-teal-500/15 text-teal-400 border border-teal-500/20";
        } else {
          btn.className = "px-2.5 py-1 text-xs font-bold rounded-lg transition-all duration-200 text-slate-400 hover:text-slate-200";
        }
      });

      // 更新 HTML 中的靜態標籤 (流暢翻譯)
      document.title = uiTranslations[lang].title;
      document.getElementById('header-title').innerText = uiTranslations[lang].title;
      document.getElementById('header-subtitle').innerText = uiTranslations[lang].subtitle;
      document.getElementById('global-search-input').placeholder = uiTranslations[lang].searchPlaceholder;
      
      // 更新下拉選單按鈕文字
      updateDropdownButton();

      // 詳細解析版塊靜態標籤
      document.getElementById('label-metadata').innerText = uiTranslations[lang].metadataLabel;
      document.getElementById('label-core-def').innerText = uiTranslations[lang].coreDefinition;
      document.getElementById('label-subfields').innerText = uiTranslations[lang].exploreBlocks;
      document.getElementById('label-skills').innerText = uiTranslations[lang].essentialSkills;
      document.getElementById('label-tools').innerText = uiTranslations[lang].industryTools;
      document.getElementById('label-scenario').innerText = uiTranslations[lang].scenarioChallenge;
      document.getElementById('label-instructions').innerText = uiTranslations[lang].instructions;
      
      // Footer 與版權
      document.getElementById('footer-text').innerText = uiTranslations[lang].footer;

      // 重新渲染動態組件與目前選取的分支
      renderDomainMindmap(currentDomainKey);
      selectBranch(activeBranchId);
    }

    // 4. 動態屬性語系翻譯助手 (Helper)
    function t(obj) {
      if (!obj) return '';
      if (typeof obj === 'string') return obj;
      return obj[currentLang] || obj['zh'] || '';
    }

    // 5. 初始化載入
    window.addEventListener('load', () => {
      // 預設為繁體中文、金融領域、企業金融分支
      const savedLang = localStorage.getItem('kb_lang');
      setLanguage(savedLang && ['zh','en','fr'].includes(savedLang) ? savedLang : 'zh');
      
      // 全局搜尋監聽
      const searchInput = document.getElementById('global-search-input');
      searchInput.addEventListener('input', (e) => {
        handleGlobalSearch(e.target.value.trim());
      });

      // 監聽視窗尺寸改變，即時重繪連接線
      window.addEventListener('resize', drawConnections);
      
      // 點擊外部自動關閉下拉框
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#domain-dropdown-wrap')) closeDomainDropdown();
        if (!e.target.closest('#global-search-input') && !e.target.closest('#search-results-dropdown')) {
          document.getElementById('search-results-dropdown').classList.add('hidden');
        }
      });
    });

    // 6. 切換學科領域
    function switchDomain(domainKey) {
      if (!domainDatabase[domainKey]) return;
      currentDomainKey = domainKey;

      // 更新下拉選單按鈕外觀
      updateDropdownButton();

      // 重繪選取領域的心智圖
      renderDomainMindmap(domainKey);

      // 預設選取該領域的第一個分支子節點
      const firstBranchId = Object.keys(domainDatabase[domainKey].branches)[0];
      selectBranch(firstBranchId);
    }

    // 7. 渲染心智圖 (動態重構)
    function renderDomainMindmap(domainKey) {
      const data = domainDatabase[domainKey];
      
      // 更新標題引導與指示器
      document.getElementById('domain-indicator-text').innerText = t(data.indicatorText);
      
      const indicatorIcon = document.getElementById('domain-indicator-icon');
      indicatorIcon.className = `fa-solid ${data.indicatorIcon} text-${data.themeColor}-400 animate-pulse`;

      // 設置中心節點 (Hub)
      document.getElementById('central-zh').innerText = t(data.centralNode.zh);
      document.getElementById('central-en').innerText = t(data.centralNode.en);
      
      const badge = document.getElementById('central-badge');
      badge.innerText = t(data.centralNode.badge);
      badge.className = `absolute -bottom-2 bg-slate-900 text-[10px] text-${data.themeColor}-400 border border-${data.themeColor}-500/20 px-2.5 py-0.5 rounded-full font-bold`;

      const hubGlow = document.getElementById('central-hub-glow');
      hubGlow.className = `absolute -inset-1.5 bg-gradient-to-r from-${data.themeColor}-500 to-${data.themeColor}-700 rounded-2xl blur-lg opacity-60 group-hover:opacity-100 transition duration-500`;

      // 渲染子節點
      const grid = document.getElementById('nodes-grid');
      grid.innerHTML = '';

      const branches = Object.values(data.branches);
      grid.className = `grid grid-cols-2 md:grid-cols-${branches.length} gap-4 lg:gap-6 w-full max-w-6xl mt-2`;

      branches.forEach((branch) => {
        const btn = document.createElement('button');
        btn.id = `node-${branch.id}`;
        btn.onclick = () => selectBranch(branch.id);
        
        btn.className = `col-span-1 text-left flex flex-col justify-between p-4 rounded-2xl bg-slate-950/40 border border-slate-900 hover:border-${data.themeColor}-500/30 transition-all duration-300 relative group cursor-pointer`;
        
        btn.innerHTML = `
          <div class="flex items-start justify-between mb-4">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-${data.themeColor}-500/10 to-${data.themeColor}-500/5 border border-white/5 flex items-center justify-center transition-transform duration-300 group-hover:scale-105">
              <i class="fa-solid ${branch.icon} text-${data.themeColor}-400 text-sm md:text-base"></i>
            </div>
            <span class="text-[9px] bg-slate-900 text-${data.themeColor}-400 border border-${data.themeColor}-500/10 px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">${t(branch.badge)}</span>
          </div>
          <div>
            <h4 class="text-xs md:text-sm font-bold text-slate-100 group-hover:text-white">${t(branch.title)}</h4>
            <p class="text-[9px] text-slate-500 font-semibold truncate mt-0.5 uppercase tracking-wide font-mono">${t(branch.englishTitle)}</p>
          </div>
          <div id="glow-bar-${branch.id}" class="absolute bottom-0 left-4 right-4 h-0.5 rounded-full transition-all duration-300 opacity-0" style="background-color: ${data.hexColor}" />
        `;

        grid.appendChild(btn);
      });

      // 繪製連接線
      setTimeout(drawConnections, 150);
    }

    // 8. 選取特定分支子節點
    function selectBranch(branchId) {
      activeBranchId = branchId;
      const data = domainDatabase[currentDomainKey];
      const branch = data.branches[branchId];
      if (!branch) return;

      // A. 更新地圖節點的高亮狀態
      const allNodes = document.querySelectorAll('#nodes-grid button');
      allNodes.forEach(node => {
        const id = node.id.replace('node-', '');
        const glowBar = document.getElementById(`glow-bar-${id}`);
        if (id === branchId) {
          node.className = `col-span-1 text-left flex flex-col justify-between p-4 rounded-2xl bg-slate-900 border border-${data.themeColor}-500/60 ring-2 ring-${data.themeColor}-500/30 shadow-glow-${data.themeColor} scale-[1.03] transition-all duration-300 relative group cursor-pointer`;
          if (glowBar) glowBar.classList.remove('opacity-0');
        } else {
          node.className = `col-span-1 text-left flex flex-col justify-between p-4 rounded-2xl bg-slate-950/40 border border-slate-900 hover:border-${data.themeColor}-500/30 transition-all duration-300 relative group cursor-pointer`;
          if (glowBar) glowBar.classList.add('opacity-0');
        }
      });

      // B. 重繪連接線
      drawConnections();

      // C. 載入詳細資訊板塊的翻譯文本
      document.getElementById('detail-title').innerText = t(branch.title);
      document.getElementById('detail-tag').innerText = t(branch.englishTitle);
      document.getElementById('detail-meta').innerText = currentDomainKey.toUpperCase();
      document.getElementById('detail-desc').innerText = t(branch.description);

      // 更新 Icon 主題與配色
      const iconBox = document.getElementById('detail-icon-box');
      iconBox.className = `p-3.5 rounded-2xl transition-all duration-300 bg-${data.themeColor}-500/10 text-${data.themeColor}-400 border border-${data.themeColor}-500/20`;
      
      const iconEl = document.getElementById('detail-icon');
      iconEl.className = `fa-solid ${branch.icon} text-2xl`;

      const detailTag = document.getElementById('detail-tag');
      detailTag.className = `text-xs uppercase tracking-wider font-bold font-sans text-${data.themeColor}-400`;

      // D. 渲染子領域 (Subfields)
      const subfieldsContainer = document.getElementById('detail-subfields');
      subfieldsContainer.innerHTML = '';
      branch.subfields.forEach(sub => {
        const card = document.createElement('div');
        card.className = `p-4 rounded-2xl bg-slate-900/40 border border-slate-900 hover:border-slate-800 transition-all duration-300`;
        card.innerHTML = `
          <h5 class="text-xs md:text-sm font-bold text-white mb-1.5 flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full" style="background-color: ${data.hexColor}"></span>
            ${t(sub.name)}
          </h5>
          <p class="text-[11px] text-slate-400 leading-relaxed font-light">${t(sub.desc)}</p>
        `;
        subfieldsContainer.appendChild(card);
      });

      // E. 渲染專業技能 (Skills) 
      const skillsContainer = document.getElementById('detail-skills');
      skillsContainer.innerHTML = '';
      branch.skills.forEach(skillObj => {
        const li = document.createElement('li');
        li.className = 'flex items-start gap-3 text-xs md:text-sm text-slate-300 font-light leading-relaxed';
        
        // 解析簡單 Markdown 的 ** 粗體語法
        const skillText = t(skillObj);
        const formattedSkill = skillText.replace(/\*\*(.*?)\*\*/g, `<strong class="text-white font-semibold">$1</strong>`);
        
        li.innerHTML = `
          <span class="mt-1" style="color: ${data.hexColor}"><i class="fa-solid fa-circle-check"></i></span>
          <div>${formattedSkill}</div>
        `;
        skillsContainer.appendChild(li);
      });

      // F. 渲染工具
      const toolsContainer = document.getElementById('detail-tools');
      toolsContainer.innerHTML = '';
      branch.tools.forEach(tool => {
        const tag = document.createElement('span');
        tag.className = `px-3 py-1.5 bg-slate-900 border border-slate-850 hover:border-${data.themeColor}-500/30 rounded-xl text-xs font-semibold text-slate-300 cursor-default transition-all duration-200`;
        tag.innerText = tool;
        toolsContainer.appendChild(tag);
      });

      // G. 渲染情境題目
      document.getElementById('scenario-question').innerText = t(branch.scenario.question);
      const optionsContainer = document.getElementById('scenario-options');
      optionsContainer.innerHTML = '';

      const feedbackEl = document.getElementById('scenario-feedback');
      feedbackEl.className = 'hidden';

      branch.scenario.options.forEach((opt, idx) => {
        const optBtn = document.createElement('button');
        optBtn.className = 'w-full text-left p-3.5 rounded-xl bg-slate-900/60 border border-slate-800/80 text-xs md:text-sm text-slate-300 hover:bg-slate-900 hover:border-slate-700/80 transition-all duration-200';
        optBtn.innerText = t(opt.text);
        optBtn.onclick = () => submitScenario(idx, branch.scenario.options, data.themeColor);
        optionsContainer.appendChild(optBtn);
      });
    }

    // 9. 提報情境答案與解析
    function submitScenario(selectedIndex, options, themeColor) {
      const feedbackEl = document.getElementById('scenario-feedback');
      const optionButtons = document.querySelectorAll('#scenario-options button');
      const selectedOpt = options[selectedIndex];

      optionButtons.forEach((btn, idx) => {
        btn.className = 'w-full text-left p-3.5 rounded-xl text-xs md:text-sm transition-all duration-200 ';
        if (idx === selectedIndex) {
          if (selectedOpt.correct) {
            btn.classList.add('bg-emerald-950/40', 'border-emerald-500/80', 'text-emerald-300');
          } else {
            btn.classList.add('bg-rose-950/40', 'border-rose-500/80', 'text-rose-300');
          }
        } else {
          btn.classList.add('bg-slate-900/40', 'border-slate-800/40', 'text-slate-500', 'cursor-not-allowed');
          btn.disabled = true;
        }
      });

      feedbackEl.className = 'block rounded-xl p-4 text-xs md:text-sm leading-relaxed transition-all duration-300 ';
      
      const correctLabel = uiTranslations[currentLang].answerCorrect;
      const analysisLabel = uiTranslations[currentLang].answerAnalysis;
      const retryLabel = uiTranslations[currentLang].retryBtn;

      if (selectedOpt.correct) {
        feedbackEl.classList.add('bg-emerald-950/30', 'border', 'border-emerald-500/30', 'text-emerald-300');
        feedbackEl.innerHTML = `<i class="fa-solid fa-circle-check text-base mr-1.5 align-middle"></i> <strong>${correctLabel}</strong> ${t(selectedOpt.reason)}`;
      } else {
        feedbackEl.classList.add('bg-rose-950/30', 'border', 'border-rose-500/30', 'text-rose-300');
        feedbackEl.innerHTML = `<i class="fa-solid fa-circle-xmark text-base mr-1.5 align-middle"></i> <strong>${analysisLabel}</strong> ${t(selectedOpt.reason)}`;
        
        const retryBtn = document.createElement('button');
        retryBtn.className = `mt-3 block text-xs bg-slate-900 hover:bg-slate-850 border border-slate-800 px-3 py-1.5 rounded-lg text-slate-300 font-medium transition-colors`;
        retryBtn.innerText = retryLabel;
        retryBtn.onclick = () => { selectBranch(activeBranchId); };
        feedbackEl.appendChild(retryBtn);
      }
    }

    // 10. 繪製動態 SVG 連接線 (響應式完美定位)
    function drawConnections() {
      const canvas = document.getElementById('svg-canvas');
      const hub = document.getElementById('central-hub');
      const childNodes = document.querySelectorAll('#nodes-grid button');

      if (!canvas || !hub || childNodes.length === 0) return;

      canvas.innerHTML = '';

      const canvasRect = canvas.getBoundingClientRect();
      const hubRect = hub.getBoundingClientRect();

      // 計算中心點
      const startX = hubRect.left + hubRect.width / 2 - canvasRect.left;
      const startY = hubRect.bottom - canvasRect.top;

      childNodes.forEach(child => {
        const childRect = child.getBoundingClientRect();
        
        // 計算子節點頂部起點
        const endX = childRect.left + childRect.width / 2 - canvasRect.left;
        const endY = childRect.top - canvasRect.top;

        const childId = child.id.replace('node-', '');
        const isSelected = (childId === activeBranchId);

        // 建立貝氏曲線
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const midY = (startY + endY) / 2;
        const d = `M ${startX} ${startY} C ${startX} ${midY}, ${endX} ${midY}, ${endX} ${endY}`;
        
        path.setAttribute('d', d);
        path.setAttribute('fill', 'none');

        const activeColor = domainDatabase[currentDomainKey].hexColor;

        if (isSelected) {
          path.setAttribute('stroke', activeColor);
          path.setAttribute('stroke-width', '2.5');
          path.setAttribute('class', 'active-connection-line opacity-100 transition-all duration-300');
          
          const glowPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          glowPath.setAttribute('d', d);
          glowPath.setAttribute('fill', 'none');
          glowPath.setAttribute('stroke', activeColor);
          glowPath.setAttribute('stroke-width', '6');
          glowPath.setAttribute('class', 'opacity-20 blur-sm pointer-events-none');
          canvas.appendChild(glowPath);
        } else {
          path.setAttribute('stroke', '#1e293b');
          path.setAttribute('stroke-width', '1.5');
          path.setAttribute('stroke-dasharray', '4,4');
          path.setAttribute('class', 'opacity-40 transition-all duration-300');
        }

        canvas.appendChild(path);
      });
    }

    // 11. 跨領域/語言智能搜尋引擎 (模糊多語言檢索)
    function handleGlobalSearch(query) {
      const dropdown = document.getElementById('search-results-dropdown');
      if (!query) {
        dropdown.classList.add('hidden');
        dropdown.innerHTML = '';
        return;
      }

      const q = query.toLowerCase();
      const results = [];

      // 橫跨三大領域、全語言庫索引
      Object.keys(domainDatabase).forEach(domainKey => {
        const domain = domainDatabase[domainKey];
        Object.keys(domain.branches).forEach(branchId => {
          const branch = domain.branches[branchId];
          
          // 將中文、英文、法文之資訊全數彙整，建立全語系索引
          const textPool = [
            branch.title.zh, branch.title.en, branch.title.fr,
            branch.englishTitle.zh, branch.englishTitle.en, branch.englishTitle.fr,
            branch.description.zh, branch.description.en, branch.description.fr,
            ...branch.subfields.flatMap(s => [s.name.zh, s.name.en, s.name.fr, s.desc.zh, s.desc.en, s.desc.fr]),
            ...branch.skills.flatMap(s => [s.zh, s.en, s.fr]),
            ...branch.tools
          ].join(' ').toLowerCase();

          if (textPool.includes(q)) {
            results.push({
              domainKey: domainKey,
              branchId: branchId,
              title: branch.title,
              englishTitle: branch.englishTitle,
              themeColor: domain.themeColor,
              domainName: {
                zh: domainKey === 'finance' ? '金融學' : domainKey === 'accounting' ? '會計學' : '市場行銷',
                en: domainKey === 'finance' ? 'Finance' : domainKey === 'accounting' ? 'Accounting' : 'Marketing',
                fr: domainKey === 'finance' ? 'Finance' : domainKey === 'accounting' ? 'Comptabilité' : 'Marketing'
              }
            });
          }
        });
      });

      // 渲染聯想選單
      if (results.length > 0) {
        dropdown.classList.remove('hidden');
        
        const resultsLabel = uiTranslations[currentLang].searchResults;
        const clickToJumpLabel = uiTranslations[currentLang].clickToJump;

        dropdown.innerHTML = `
          <div class="p-2 border-b border-slate-800/60 flex items-center justify-between sticky top-0 bg-slate-950 z-10">
            <span class="text-[10px] text-slate-500 font-semibold tracking-wider uppercase">${resultsLabel} (${results.length})</span>
            <span class="text-[10px] text-teal-400 font-bold">${clickToJumpLabel}</span>
          </div>
        `;

        results.forEach(res => {
          const row = document.createElement('button');
          row.className = 'w-full text-left px-3.5 py-3 hover:bg-slate-900/60 flex items-center justify-between border-b border-slate-900 last:border-0 transition-colors gap-3';
          row.onclick = () => {
            // 自動跳轉至對應學科與分支
            switchDomain(res.domainKey);
            selectBranch(res.branchId);
            
            // 滾動導航到詳細解析卡片
            document.getElementById('detail-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
            
            // 隱藏搜尋結果
            dropdown.classList.add('hidden');
            document.getElementById('global-search-input').value = '';
          };

          row.innerHTML = `
            <div>
              <div class="text-xs font-bold text-slate-200">${t(res.title)}</div>
              <div class="text-[10px] text-slate-400 mt-0.5 truncate max-w-[180px]">${t(res.englishTitle)}</div>
            </div>
            <span class="text-[10px] px-2 py-0.5 font-bold rounded bg-${res.themeColor}-500/10 text-${res.themeColor}-400 border border-${res.themeColor}-500/20 whitespace-nowrap">
              ${t(res.domainName)}
            </span>
          `;
          dropdown.appendChild(row);
        });
      } else {
        dropdown.classList.remove('hidden');
        dropdown.innerHTML = `
          <div class="p-4 text-center text-xs text-slate-500">
            ${uiTranslations[currentLang].noResults}
          </div>
        `;
      }
    }
  </script>
</body>
</html>
