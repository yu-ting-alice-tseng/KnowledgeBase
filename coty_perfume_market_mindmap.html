        let currentLang = 'en';
        
        const container = document.getElementById('mindmap-container');
        let width = window.innerWidth;
        let height = window.innerHeight;

        // Initialize SVG
        const svg = d3.select("#mindmap-container").append("svg")
            .attr("width", width)
            .attr("height", height);

        const g = svg.append("g");

        // Add zoom behavior
        const zoom = d3.zoom()
            .scaleExtent([0.3, 3])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });
        svg.call(zoom);

        // Resize handler
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            svg.attr("width", width).attr("height", height);
        });

        // Tree layout configuration
        const tree = d3.tree().size([height - 100, width - 400]);

        function updateMindmap(data) {
            // Clear current content inside g
            g.selectAll("*").remove();

            // Set up hierarchy
            const root = d3.hierarchy(data);
            tree(root);

            // Shift layout to left-to-right orientation nicely centered
            root.each(d => {
                d.y = d.depth * 280; // Distance between layers
            });

            // Draw links
            g.selectAll(".link")
                .data(root.links())
                .enter().append("path")
                .attr("class", "link")
                .attr("d", d3.linkHorizontal()
                    .x(d => d.y)
                    .y(d => d.x)
                );

            // Create nodes
            const node = g.selectAll(".node")
                .data(root.descendants())
                .enter().append("g")
                .attr("class", d => `node ${d.depth === 0 ? "node--root" : d.children ? "node--internal" : "node--leaf"}`)
                .attr("transform", d => `translate(${d.y},${d.x})`);

            // Append circles
            node.append("circle")
                .attr("r", d => d.depth === 0 ? 10 : d.children ? 6 : 4);

            // Append labels
            node.append("text")
                .attr("dy", "0.31em")
                .attr("x", d => d.children ? -12 : 12)
                .attr("text-anchor", d => d.children ? "end" : "start")
                .text(d => d.data.name)
                .clone(true).lower()
                .attr("stroke", "#0d1117")
                .attr("stroke-width", 3);

            // Center view on initial render or switch
            const initialTransform = d3.zoomIdentity.translate(80, 40).scale(0.85);
            svg.transition().duration(400).call(zoom.transform, initialTransform);
        }

        function switchLanguage(lang) {
            currentLang = lang;
            
            // Toggle active classes on buttons
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');

            };
            document.getElementById('title').innerText = titles[lang];

            // Rerender tree with translated data
            updateMindmap(rawData[lang]);
        }
